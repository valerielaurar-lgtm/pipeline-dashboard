      var insightBanner = '<div class="funnel-banner" style="border-left-color:var(--accent);margin-bottom:24px">' +

      insightBanner += '</div>';

      function normalizeRejections(raw) {
        var mapped = { 'TA Screening': 0, 'Team Fit': 0, 'Technical': 0, 'Cultural': 0, 'Offer': 0, 'Other': 0 };
        for (var stage in raw) {
          var count = raw[stage];
          var s = stage.toLowerCase().trim();
          if (s === 'ta screening' || s === 'ta first review' || s === 'hm screening' || s === 'hiring manager screening') mapped['TA Screening'] += count;
          else if (s === 'team fit' || s === 'meeting joeri - team fit') mapped['Team Fit'] += count;
          else if (s === 'technical' || s === 'technical case study & interview') mapped['Technical'] += count;
          else if (s === 'cultural' || s === 'cultural interview' || s === 'automated reference with zinc') mapped['Cultural'] += count;
          else if (s === 'offer') mapped['Offer'] += count;
          else if (s !== 'application review' && s !== 'unknown') mapped['Other'] += count;
        }
        return mapped;
      }

      var datasets = [
        { label: 'All Roles', raw: ANALYTICS.rejection_by_stage },
        { label: 'Excl. Intern', raw: ANALYTICS.rejection_by_stage_excl_intern },

            '<td class="num"' + (fe.screens_per_technical > 10 && fe.ta_screens > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + sptech + '</td>' +
            '<td class="num"' + (fe.tf_to_tech_pct < 30 && fe.team_fit_entered > 3 ? ' style="color:var(--orange);font-weight:700"' : '') + '>' + (fe.team_fit_entered > 0 ? fe.tf_to_tech_pct + '%' : '\u2014') + '</td>' +
            '<td>' + flags.join(' ') + '</td>' +

            '<td class="dept-cell">' + escHtml(rr.dept) + '</td>' +

        });

    /* ===== WEEKLY OVERVIEW TAB ===== */
    function renderWeekly() {
      var roles = WEEKLY.roles || [];
      var lwLabel = WEEKLY.last_week_label || 'Last Week';
      var twLabel = WEEKLY.this_week_label || 'This Week';

      function fmt(n) { return n > 0 ? '<span style="font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">—</span>'; }
      function fmtPipe(n) { return n > 0 ? '<span style="color:#2563eb;font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">—</span>'; }
      function fmtRej(n) { return n > 0 ? '<span style="color:#ef4444;font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">—</span>'; }

      // Group by dept — merge Revenue into Sales
      var deptMap = {};
      var deptOrder = [];
      roles.forEach(function(r) {
        var dept = r.dept === 'Revenue' ? 'Sales' : r.dept;
        if (!deptMap[dept]) { deptMap[dept] = []; deptOrder.push(dept); }
        deptMap[dept].push(r);
      });
      deptOrder.sort();

      var html = '<div style="text-align:center;margin-bottom:24px">' +
        '<h2 style="font-size:20px;font-weight:700;color:#1a1a2e">📊 Weekly Pipeline Overview</h2>' +
        '<p style="font-size:13px;color:#6b7280;margin-top:4px">Pipeline = active candidates &nbsp;|&nbsp; ' +
        lwLabel + ' = rejected last week &nbsp;|&nbsp; ' + twLabel + ' = rejected this week</p></div>';

      deptOrder.forEach(function(dept) {
        var deptRoles = deptMap[dept];
        if (dept === 'Customer Support') {
          deptRoles.sort(function(a, b) {
            var aAgent = /agent/i.test(a.role) ? 0 : 1;
            var bAgent = /agent/i.test(b.role) ? 0 : 1;
            if (aAgent !== bAgent) return aAgent - bAgent;
            return a.role.localeCompare(b.role);
          });
        }
        if (dept === 'Sales') {
          var usKeywords = /north america|new york|usa|\bUS\b/i;
          deptRoles.sort(function(a, b) {
            var aUS = usKeywords.test(a.role) ? 1 : 0;
            var bUS = usKeywords.test(b.role) ? 1 : 0;
            if (aUS !== bUS) return aUS - bUS;
            return a.role.localeCompare(b.role);
          });
        }
        html += '<div style="margin-bottom:24px">';
        html += '<div style="font-size:14px;font-weight:700;color:#fff;background:#1a1a2e;padding:8px 16px;border-radius:8px 8px 0 0">' + dept + '</div>';

        deptRoles.forEach(function(r, idx) {
          var isLast = idx === deptRoles.length - 1;
          var borderRadius = isLast ? 'border-radius:0 0 8px 8px;' : '';
          html += '<div style="background:#fff;border:1px solid #e5e7eb;border-top:none;padding:16px 20px 12px;' + borderRadius + '">';
          html += '<div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:2px">' + r.role + '</div>';
          html += '<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">' + (r.recruiter || '') + '</div>';

          html += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
          html += '<tr><th style="text-align:left;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Stage</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Pipeline</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Last Wk Rejected</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">This Wk Rejected</th></tr>';

          (r.stages || []).forEach(function(s) {
            var isOffer = s.stage === 'Offer';
            var rowStyle = isOffer ? 'background:#f0fdf4;' : '';
            var stageStyle = isOffer ? 'font-weight:700;color:#16a34a;' : 'font-weight:500;color:#374151;';
            html += '<tr style="' + rowStyle + '">' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;' + stageStyle + '">' + s.stage + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtPipe(s.pipeline) + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtRej(s.rej_lw) + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtRej(s.rej_tw) + '</td></tr>';
          });

          // Total row
          html += '<tr style="border-top:2px solid #e5e7eb">' +
            '<td style="padding:5px 12px;font-weight:700;color:#1a1a2e">Total</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtPipe(r.total_pipeline) + '</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtRej(r.total_rej_lw) + '</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtRej(r.total_rej_tw) + '</td></tr>';

          html += '</table></div>';
        });

        html += '</div>';
      });

      /* ---- Candidates Needed in Technical ---- */
      if (EXEC && EXEC.roles) {
        html += '<div style="margin-top:40px;text-align:center"><h2 style="font-size:20px;font-weight:700;color:#1a1a2e">🎯 Candidates Needed in Technical to Fill</h2>';
        html += '<p style="font-size:13px;color:#6b7280;margin-top:4px">Based on actual historical data: how many candidates reached Technical for each offer made.</p></div>';

        html += '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:16px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)">';
        html += '<thead><tr style="background:#1a1a2e;color:#fff">';
        html += '<th style="padding:10px 12px;text-align:left">Role</th><th style="padding:10px 12px;text-align:left">Dept</th>';
        html += '<th style="padding:10px 8px;text-align:right">Pos</th><th style="padding:10px 8px;text-align:right">In Tech+</th>';
        html += '<th style="padding:10px 8px;text-align:right">Tech/Offer</th><th style="padding:10px 8px;text-align:right">Need</th>';
        html += '<th style="padding:10px 8px;text-align:right">Gap</th><th style="padding:10px 12px;text-align:center">Proximity</th>';
        html += '<th style="padding:10px 8px;text-align:right">Avg TA→Tech</th>';
        html += '</tr></thead><tbody>';

        var proxOrder = {'Offer stage':0,'Close':1,'On track':2,'Building':3,'Early':4};
        var execSorted = EXEC.roles.slice().sort(function(a, b) {
          if (a.tech_needed.has_data && !b.tech_needed.has_data) return -1;
          if (!a.tech_needed.has_data && b.tech_needed.has_data) return 1;
          if (a.tech_needed.has_data && b.tech_needed.has_data) {
            var pa = proxOrder[a.tech_needed.hire_proximity] ?? 5;
            var pb = proxOrder[b.tech_needed.hire_proximity] ?? 5;
            if (pa !== pb) return pa - pb;
          }
          return b.tech_needed.gap - a.tech_needed.gap;
        });
        execSorted.forEach(function(r, i) {
          var tn = r.tech_needed;
          var bg = i % 2 === 0 ? '#fff' : '#f9fafb';
          html += '<tr style="background:' + bg + '">';
          html += '<td style="padding:6px 12px;font-weight:600;color:#1a1a2e">' + r.name + '</td>';
          html += '<td style="padding:6px 12px;color:#6b7280">' + r.dept + '</td>';
          html += '<td style="padding:6px 8px;text-align:right">' + tn.positions + '</td>';
          html += '<td style="padding:6px 8px;text-align:right">' + tn.current + '</td>';
          if (tn.has_data) {
            var proxColors = {'Offer stage':'#16a34a','Close':'#0d9488','On track':'#2563eb','Building':'#d97706','Early':'#9ca3af'};
            var pc = proxColors[tn.hire_proximity] || '#9ca3af';
            html += '<td style="padding:6px 8px;text-align:right;color:#6b7280">' + tn.tech_per_offer + ':1</td>';
            html += '<td style="padding:6px 8px;text-align:right;font-weight:700">' + tn.needed + '</td>';
            html += '<td style="padding:6px 8px;text-align:right;font-weight:700;color:' + (tn.gap > 0 ? '#ef4444' : '#16a34a') + '">' + (tn.gap > 0 ? '+' + tn.gap : tn.gap) + '</td>';
            html += '<td style="padding:6px 12px;text-align:center;font-weight:600;color:' + pc + '">' + tn.hire_proximity + ' <span style="font-weight:400;opacity:.6">(' + tn.progress_pct + '%)</span></td>';
          } else {
            html += '<td style="padding:6px 8px;text-align:right;color:#d1d5db">—</td>';
            html += '<td style="padding:6px 8px;text-align:right">' + tn.entered_tech + '</td>';
            html += '<td style="padding:6px 8px;text-align:right;color:#d1d5db">—</td>';
            html += '<td style="padding:6px 12px;text-align:center;color:#9ca3af">No hire yet</td>';
          }
          // Avg TA → Tech timing
          var taDays = r.avg_ta_to_tech || 0;
          if (taDays > 0) {
            var taDayColor = taDays > 21 ? '#ef4444' : (taDays > 14 ? '#d97706' : '#16a34a');
            html += '<td style="padding:6px 8px;text-align:right;font-weight:600;color:' + taDayColor + '">' + taDays + 'd</td>';
          } else {
            html += '<td style="padding:6px 8px;text-align:right;color:#d1d5db">—</td>';
          }
          html += '</tr>';
        });
        html += '</tbody></table>';

        /* ---- Rejection Reasons by Stage per Role ---- */
        html += '<div style="margin-top:40px;text-align:center"><h2 style="font-size:20px;font-weight:700;color:#1a1a2e">📋 Rejection Reasons by Stage per Role</h2>';
        html += '<p style="font-size:13px;color:#6b7280;margin-top:4px">Only showing candidates who fit requirements or declined us. "Doesn\'t fit strong requirement" excluded.</p></div>';

        EXEC.roles.forEach(function(r) {
          var rr = r.rej_reasons || {};
          var rrStages = ['App Review','TA Screen','Team Fit','Technical','Cultural Fit','Offer'];
          var hasReasons = rrStages.some(function(s) { return rr[s] && rr[s].reasons.length > 0; });
          if (!hasReasons) return;

          html += '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px 20px;margin-top:12px">';
          html += '<div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:2px">' + r.name + '</div>';
          html += '<div style="font-size:11px;color:#9ca3af;margin-bottom:10px">' + r.dept + '</div>';
          html += '<div style="display:flex;flex-wrap:wrap;gap:20px">';
          rrStages.forEach(function(stage) {
            if (!rr[stage] || !rr[stage].reasons.length) return;
            html += '<div style="min-width:170px;flex:1">';
            html += '<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;border-bottom:1px solid #e5e7eb;padding-bottom:3px">' + stage + ' <span style="color:#9ca3af;font-weight:400">(' + rr[stage].total + ')</span></div>';
            rr[stage].reasons.forEach(function(item) {
              var short = item.reason.replace('Fits requirement, ','').replace('Fits most requirement, ','').replace('Declined us, ','').replace('Declined us - ','').replace('Declined by us ','').replace('Declined by us, ','');
              html += '<div style="font-size:11px;display:flex;justify-content:space-between;gap:6px;padding:2px 0">';
              html += '<span style="color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + item.reason + '">' + short + '</span>';
              html += '<span style="font-weight:600;white-space:nowrap">' + item.pct + '%</span>';
              html += '</div>';
            });
            html += '</div>';
          });
          html += '</div></div>';
        });
      }

      document.getElementById('tab-weekly').innerHTML = html;
    }

    /* Render all tabs */
    renderPipeline();
    renderRecruiter();
    renderDepartment();
    renderPerformance();
    renderEffectiveness();
    renderOverview();
    renderWeekly();
  </script>
</body>
</html>
