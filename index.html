<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Health Dashboard</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --white: #ffffff;
      --text: #1e2a3a;
      --text-dim: #6b7a8d;
      --border: #e2e6ec;
      --accent: #0ea5a0;
      --green: #0ea570;
      --green-bg: #e6f7ef;
      --orange: #e07a2f;
      --orange-bg: #fdf0e4;
      --teal: #0ea5a0;
      --teal-bg: #e0f5f4;
      --red: #d94052;
      --red-bg: #fde8eb;
      --gray: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 48px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
      padding-top: 20px;
      background: var(--white);
      padding-left: 32px;
      padding-right: 32px;
    }
    .tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 26px;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .kpi-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1.5px;
      color: var(--text);
    }

    /* Funnel Banner */
    .funnel-banner {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 14px 22px;
      margin-bottom: 32px;
      font-size: 14px;
      color: var(--text-dim);
    }
    .funnel-banner strong { color: var(--text); font-weight: 600; }
    .funnel-banner .gate { color: var(--red); font-weight: 700; }
    .funnel-arrow { color: var(--gray); margin: 0 4px; }

    /* Section */
    .section { margin-bottom: 32px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      padding-left: 4px;
    }
    .section-bar {
      width: 4px;
      height: 20px;
      border-radius: 2px;
      background: var(--accent);
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-count { font-size: 14px; color: var(--text-dim); }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .data-table thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
      white-space: nowrap;
    }
    .data-table thead th.num { text-align: center; }
    .data-table tbody tr { transition: background 0.1s; }
    .data-table tbody tr:hover { background: #f8f9fb; }
    .data-table tbody tr:not(:last-child) td { border-bottom: 1px solid #f0f2f5; }
    .data-table tbody td {
      padding: 14px 16px;
      font-size: 14px;
      vertical-align: middle;
    }
    .data-table tbody td.num {
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .data-table tbody td.role-cell { font-weight: 600; max-width: 240px; }
    .data-table tbody td.dept-cell { color: var(--text-dim); }
    .data-table tbody td.age-cell { font-variant-numeric: tabular-nums; }
    .data-table tbody td.recruiter-cell { color: var(--text-dim); font-size: 13px; }
    .data-table tbody td.hires-cell { font-weight: 700; font-variant-numeric: tabular-nums; }

    /* Health Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge.on_track  { background: var(--green-bg); color: var(--green); }
    .badge.secured   { background: var(--teal-bg);  color: var(--teal); }
    .badge.covered   { background: var(--teal-bg);  color: var(--teal); }
    .badge.at_risk   { background: var(--orange-bg); color: var(--orange); }
    .badge.empty     { background: #f1f5f9;         color: var(--gray); }
    .badge.healthy   { background: var(--green-bg); color: var(--green); }
    .badge.unhealthy { background: var(--red-bg);   color: var(--red); }

    .highlight-post { color: var(--accent); font-weight: 700 !important; }
    .highlight-cultural { color: #d97706; font-weight: 700 !important; }
    .highlight-offer { color: var(--green); font-weight: 700 !important; }
    .zero { color: #c5cdd8; }

    /* SLA Badges */
    .sla-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .pos-multi {
      color: var(--accent) !important;
      font-weight: 700 !important;
    }
    .sla-badge.overdue { background: var(--red); color: #fff; }
    .sla-badge.warning { background: var(--orange); color: #fff; }
    .sla-badge.filling { background: var(--green); color: #fff; }

    /* Empty section */
    .empty-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .empty-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .empty-card .name { font-size: 14px; font-weight: 600; }
    .empty-card .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .empty-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #e2e6ec;
    }

    /* Issue type badges */
    .issue-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .issue-badge.quality      { background: #fef3c7; color: #92400e; }
    .issue-badge.calibration  { background: #ede9fe; color: #5b21b6; }
    .issue-badge.risk         { background: var(--red-bg); color: var(--red); }
    .issue-badge.sustainability { background: var(--orange-bg); color: var(--orange); }
    .issue-badge.stakeholder  { background: #dbeafe; color: #1e40af; }

    /* Red-flagged row */
    .row-flagged td { background: #fff5f5 !important; }

    /* Tab content containers */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Passthrough rate cards */
    .passthrough-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }
    .passthrough-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 18px 22px;
      text-align: center;
    }
    .passthrough-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .passthrough-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent);
    }

    @media (max-width: 1000px) {
      .kpi-row { grid-template-columns: 1fr; }
      .passthrough-row { grid-template-columns: repeat(2, 1fr); }
      .data-table { font-size: 12px; }
    }
  </style>
</head>

    var avgTTF = totalFilled > 0 ? Math.round(FILLED.reduce(function(s,f){return s+f.ttf_days},0)/totalFilled) : 0;
    var withinSLA = FILLED.filter(function(f){return f.ttf_days<=60}).length;
    var overSLA = totalFilled - withinSLA;
    var slaRate = totalFilled > 0 ? Math.round((withinSLA/totalFilled)*100) : 0;
    var opened2026 = FILLED.filter(function(f){return f.opened_at.startsWith('2026')});
    var opened2026sla = opened2026.filter(function(f){return f.ttf_days<=60}).length;
    var opened2025 = FILLED.filter(function(f){return f.opened_at.startsWith('2025')});
    var avg2025 = opened2025.length > 0 ? Math.round(opened2025.reduce(function(s,f){return s+f.ttf_days},0)/opened2025.length) : 0;

    /* ================================================================
       TAB: PIPELINE HEALTH
       ================================================================ */
    function renderPipeline() {
      var groups = {};
      for (var i = 0; i < jobs.length; i++) {
        var j = jobs[i];
        var sec;
        if (j.health === 'at_risk') sec = 'at_risk_section';
        else if (j.section !== 'offer' && (j.technical + j.cultural) >= 3) sec = 'likely_to_fill';
        else sec = j.section;
        if (!groups[sec]) groups[sec] = [];
        groups[sec].push(j);
      }

      var likelyToFill14d = jobs.filter(function(j){ return (j.technical + j.cultural) >= 3 || j.offer > 0; });
      var likelyWithinSLA = jobs.filter(function(j){ return (j.technical + j.cultural + j.offer) > 0 && j.sla_remaining >= 0; });
      var atRiskJobs = jobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; });
      var mgrDelays = ANALYTICS.manager_delays || {};
      var mgrDelayCount = Object.keys(mgrDelays).length;
      var severeCount = 0;
      for (var dk in mgrDelays) { severeCount += mgrDelays[dk].hireflix_severe + mgrDelays[dk].tech_severe; }
      var fill14Names = likelyToFill14d.map(function(j){return j.name});
      var slaNames = likelyWithinSLA.map(function(j){return j.name});
      var internJobs = jobs.filter(function(j){ return /intern/i.test(j.name); });
      var fullTimeJobs = jobs.filter(function(j){ return !/intern/i.test(j.name); });
      var totalOpenPositions = fullTimeJobs.reduce(function(s,j){return s+j.positions},0);
      var internPositions = internJobs.reduce(function(s,j){return s+j.positions},0);
      var likelyToHireCount = jobs.filter(function(j){return (j.technical + j.cultural + j.offer) > 0}).length;

      var html = '<div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:12px">' +
        '<div class="kpi-card" style="border-left:4px solid var(--text)"><div class="kpi-label">Open Positions</div><div class="kpi-value">' + totalOpenPositions + '<span style="font-size:18px;color:var(--text-dim)"> + ' + internPositions + ' intern</span></div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + fullTimeJobs.length + ' roles + ' + internJobs.length + ' intern, ' + likelyToHireCount + ' likely to hire</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">Likely to Fill (14d)</div><div class="kpi-value" style="color:var(--green)">' + likelyToFill14d.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + fill14Names.slice(0,3).join(', ') + (fill14Names.length > 3 ? '...' : '') + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--accent)"><div class="kpi-label">Likely to Hire Within SLA</div><div class="kpi-value" style="color:var(--accent)">' + likelyWithinSLA.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + slaNames.slice(0,3).join(', ') + (slaNames.length > 3 ? '...' : '') + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--red)"><div class="kpi-label">At Risk</div><div class="kpi-value" style="color:var(--red)">' + atRiskJobs.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">No candidates past Team Fit</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--orange)"><div class="kpi-label">Manager Delays</div><div class="kpi-value" style="color:var(--orange)">' + mgrDelayCount + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + severeCount + ' severe (10d+)</div></div>' +
        '</div>';

      var offerDecline = ANALYTICS.offer_decline_2026 || {accepted:0,declined:0,total:0,decline_rate:0};
      html += '<div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:12px">' +
        '<div class="kpi-card"><div class="kpi-label">Weighted Pipeline</div><div class="kpi-value">' + kpis.weighted_pipeline + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">2026 Filled</div><div class="kpi-value" style="color:var(--green)">' + totalFilled + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">Avg. ' + avgTTF + 'd TTF</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">Within 60d SLA</div><div class="kpi-value" style="color:var(--green)">' + slaRate + '%</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + withinSLA + ' of ' + totalFilled + ' &middot; ' + overSLA + ' over</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--orange)"><div class="kpi-label">Offer Decline</div><div class="kpi-value" style="color:var(--orange)">' + offerDecline.decline_rate + '%</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + offerDecline.declined + ' of ' + offerDecline.total + ' offers</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--accent)"><div class="kpi-label">2026 Hired</div><div class="kpi-value">' + opened2026.length + '</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px"><span style="font-size:10px">2025 carry-over:</span> ' + opened2025.length + ' <span style="font-size:10px">(avg ' + avg2025 + 'd)</span></div></div>' +
        '</div>';

      html += '<div class="funnel-banner">' +
        '<strong>Funnel Order (Technical is critical gate):</strong> ' +
        'App <span class="funnel-arrow">&rarr;</span> ' +
        'HM Review <span class="funnel-arrow">&rarr;</span> ' +
        'TA Screening <span class="funnel-arrow">&rarr;</span> ' +
        'Team Fit <span class="funnel-arrow">&rarr;</span> ' +
        '<span class="gate">Technical Interview (82% drop)</span> <span class="funnel-arrow">&rarr;</span> ' +
        'Culture Interview <span class="funnel-arrow">&rarr;</span> ' +
        'Offer</div>';

      for (var si = 0; si < SECTION_ORDER.length; si++) {
        var sec = SECTION_ORDER[si];
        var sJobs = groups[sec];
        if (!sJobs || sJobs.length === 0) continue;
        var barColor = sec === 'at_risk_section' ? 'var(--red)' : (sec === 'offer' || sec === 'likely_to_fill') ? 'var(--green)' : 'var(--accent)';
        html += '<div class="section">' +
          '<div class="section-header">' +
          '<div class="section-bar" style="background:' + barColor + '"></div>' +
          '<span class="section-title">' + SECTION_LABELS[sec] + '</span>' +
          '<span class="section-count">(' + sJobs.length + ' role' + (sJobs.length > 1 ? 's' : '') + ')</span>' +
          '</div>';

        if (sec === 'empty') {
          html += '<div class="empty-grid">';
          for (var ei = 0; ei < sJobs.length; ei++) {
            var ej = sJobs[ei];
            html += '<div class="empty-card"><div>' +
              '<div class="name">' + ej.name + '</div>' +
              '<div class="meta">' + ej.dept + (ej.recruiter ? ' &middot; ' + ej.recruiter : '') + '</div>' +
              '</div><div class="empty-dot"></div></div>';
          }
          html += '</div>';
        } else {
          html += '<table class="data-table"><thead><tr>' +
            '<th>Role</th><th class="num">Pos.</th><th>Dept</th><th>Pipeline Age</th><th>Health</th>' +
            '<th class="num">Early</th><th class="num">Screened</th>' +
            '<th class="num">Pre-Gate</th><th class="num">Technical</th>' +
            '<th class="num">Cultural</th><th class="num">Offer</th>' +
            '<th class="num">Exp. Hires</th><th>Recruiter</th>' +
            '</tr></thead><tbody>';

          for (var ji = 0; ji < sJobs.length; ji++) {
            var j = sJobs[ji];
            var slaIcon = '';
            if (j.sla_status === 'overdue') slaIcon = '<span class="sla-badge overdue">' + Math.abs(j.sla_remaining) + 'd over</span>';
            else if (j.sla_status === 'warning') slaIcon = '<span class="sla-badge warning">' + j.sla_remaining + 'd left</span>';
            else if (j.sla_status === 'filling') slaIcon = '<span class="sla-badge filling">Filling</span>';
            var posCell = j.positions > 1 ? '<td class="num pos-multi">' + j.positions + '</td>' : '<td class="num">' + j.positions + '</td>';
            html += '<tr>' +
              '<td class="role-cell">' + j.name + '</td>' +
              posCell +
              '<td class="dept-cell">' + j.dept + '</td>' +
              '<td class="age-cell">' + j.age_days + 'd ' + slaIcon + '</td>' +
              '<td><span class="badge ' + j.health + '">' + (HEALTH_LABELS[j.health] || j.health) + '</span></td>' +
              numCell(j.early) +
              numCell(j.screened) +
              numCell(j.pre_gate) +
              numCell(j.technical, 'highlight-post') +
              numCell(j.cultural, 'highlight-cultural') +
              numCell(j.offer, 'highlight-offer') +
              '<td class="hires-cell">' + j.exp_hires.toFixed(2) + '</td>' +
              '<td class="recruiter-cell">' + (j.recruiter || '\u2014') + '</td>' +
              '</tr>';
          }
          html += '</tbody></table>';
        }
        html += '</div>';
      }

      /* 2026 Hired table */
      html += '<div class="section" style="margin-top:48px;border-top:2px solid var(--border);padding-top:32px">' +
        '<div class="section-header">' +
        '<div class="section-bar" style="background:var(--green)"></div>' +
        '<span class="section-title">2026 Hired</span>' +
        '<span class="section-count">(' + totalFilled + ' positions filled)</span>' +
        '</div>';

      var grouped = {};
      for (var fi = 0; fi < FILLED.length; fi++) {
        var f = FILLED[fi];
        var key = f.job_name;
        if (!grouped[key]) grouped[key] = { job_name: f.job_name, dept: f.dept, recruiter: f.recruiter, fills: [] };
        grouped[key].fills.push(f.ttf_days);
      }
      var rows = Object.values(grouped).sort(function(a,b) {
        var avgA = a.fills.reduce(function(s,v){return s+v},0)/a.fills.length;
        var avgB = b.fills.reduce(function(s,v){return s+v},0)/b.fills.length;
        return avgA - avgB;
      });

      html += '<table class="data-table"><thead><tr>' +
        '<th>Role</th><th>Dept</th><th class="num">Filled</th>' +
        '<th class="num">Avg. TTF (days)</th><th>SLA</th><th>Recruiter</th>' +
        '</tr></thead><tbody>';

      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        var count = row.fills.length;
        var avg = Math.round(row.fills.reduce(function(s,v){return s+v},0)/count);
        var slaCls = avg <= 60 ? 'badge on_track' : 'badge at_risk';
        var slaLabel = avg <= 60 ? 'Within SLA' : 'Over SLA';
        var ttfCls = avg <= 60 ? '' : 'style="color:var(--red);font-weight:700"';
        var countCls = count > 1 ? ' class="num pos-multi"' : ' class="num"';
        html += '<tr>' +
          '<td class="role-cell">' + row.job_name + '</td>' +
          '<td class="dept-cell">' + row.dept + '</td>' +
          '<td' + countCls + '>' + count + '</td>' +
          '<td class="num" ' + ttfCls + '>' + avg + '</td>' +
          '<td><span class="' + slaCls + '">' + slaLabel + '</span></td>' +
          '<td class="recruiter-cell">' + row.recruiter + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';
      document.getElementById('tab-pipeline').innerHTML = html;
    }

    /* ================================================================
       TAB: RECRUITER
       ================================================================ */
    function renderRecruiter() {
      var rec = ANALYTICS.per_recruiter;
      var names = Object.keys(rec).sort(function(a,b) {
        return rec[b].open_roles - rec[a].open_roles || a.localeCompare(b);
      });
      var activeRecruiters = names.filter(function(n){ return rec[n].open_roles > 0 || rec[n].filled_2026 > 0; });
      var cols = Math.min(activeRecruiters.length, 4);
      var html = '<div class="kpi-row" style="grid-template-columns:repeat(' + cols + ',1fr);margin-bottom:24px">';
      for (var i = 0; i < activeRecruiters.length; i++) {
        var n = activeRecruiters[i];
        var r = rec[n];
        var firstName = n.split(' ')[0];
        var borderColor = r.at_risk > 0 ? 'var(--red)' : r.sla_rate >= 50 ? 'var(--green)' : 'var(--accent)';
        html += '<div class="kpi-card" style="border-left:4px solid ' + borderColor + '">' +
          '<div class="kpi-label">' + escHtml(firstName) + '</div>' +
          '<div class="kpi-value">' + r.open_roles + '<span style="font-size:16px;color:var(--text-dim)"> open</span></div>' +
          '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">' +
          r.filled_2026 + ' filled' +
          (r.avg_ttf > 0 ? ' &middot; ' + r.avg_ttf.toFixed(0) + 'd TTF' : '') +
          (r.at_risk > 0 ? ' &middot; <span style="color:var(--red);font-weight:700">' + r.at_risk + ' at risk</span>' : '') +
          '</div></div>';
      }
      html += '</div>';

      var taScreens = ANALYTICS.recruiter_ta_screens || {};
      html += '<div class="section"><div class="section-header">' +
        '<div class="section-bar"></div>' +
        '<span class="section-title">Recruiter Metrics</span>' +
        '<span class="section-count">(2026 open roles only)</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Recruiter</th><th class="num">Open Roles</th><th class="num">Filled 2026</th>' +
        '<th class="num">Avg TTF</th><th class="num">SLA Rate</th>' +
        '<th class="num">At Risk</th><th class="num">TA Screens</th><th class="num">Roles Screened</th>' +
        '</tr></thead><tbody>';

      for (var ni = 0; ni < names.length; ni++) {
        var name = names[ni];
        var rd = rec[name];
        if (rd.open_roles === 0 && rd.filled_2026 === 0) continue;
        var atRiskRatio = rd.open_roles > 0 ? (rd.at_risk / rd.open_roles) : 0;
        var flagged = (atRiskRatio > 0.3 && rd.at_risk > 0) || (rd.sla_rate > 0 && rd.sla_rate < 40);
        var rowCls = flagged ? ' class="row-flagged"' : '';
        var ts = taScreens[name] || {ta_screens:0, roles_screened:0};
        html += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(name) + '</td>' +
          numCell(rd.open_roles) +
          numCell(rd.filled_2026, rd.filled_2026 > 0 ? 'highlight-offer' : '') +
          '<td class="num">' + (rd.avg_ttf > 0 ? rd.avg_ttf.toFixed(0) + 'd' : '\u2014') + '</td>' +
          '<td class="num"' + (rd.sla_rate > 0 && rd.sla_rate < 40 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + (rd.sla_rate > 0 ? rd.sla_rate.toFixed(0) + '%' : '\u2014') + '</td>' +
          '<td class="num"' + (rd.at_risk > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rd.at_risk + '</td>' +
          numCell(ts.ta_screens, ts.ta_screens > 50 ? 'highlight-post' : '') +
          numCell(ts.roles_screened) +
          '</tr>';
      }
      html += '</tbody></table></div>';
      document.getElementById('tab-recruiter').innerHTML = html;
    }

    /* ================================================================
       TAB: DEPARTMENT
       ================================================================ */
    function renderDepartment() {
      var dept = ANALYTICS.per_department;
      var names = Object.keys(dept).filter(function(n){ return n !== 'Unknown'; }).sort(function(a,b){
        return dept[b].open_roles - dept[a].open_roles || a.localeCompare(b);
      });

      var html = '<div class="section"><div class="section-header">' +
        '<div class="section-bar" style="background:var(--accent)"></div>' +
        '<span class="section-title">Stage-to-Stage Conversion Ratios</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Department</th>' +
        '<th class="num">Early &rarr; Screened</th>' +
        '<th class="num">Screened &rarr; Team Fit</th>' +
        '<th class="num">Team Fit &rarr; Technical</th>' +
        '<th class="num">Technical &rarr; Cultural</th>' +
        '<th class="num">Cultural &rarr; Offer</th>' +
        '</tr></thead><tbody>';

      for (var ci = 0; ci < names.length; ci++) {
        var nm = names[ci];
        var dd = dept[nm];
        var p = dd.per_stage;
        function convRate(from, to) {
          if (from === 0) return '\u2014';
          var pct = Math.round((to / from) * 100);
          var cls = pct < 10 && from > 5 ? 'style="color:var(--red);font-weight:700"' : '';
          return '<span ' + cls + '>' + pct + '%</span>';
        }
        html += '<tr>' +
          '<td class="role-cell">' + escHtml(nm) + '</td>' +
          '<td class="num">' + convRate(p.early, p.screened) + '</td>' +
          '<td class="num">' + convRate(p.screened, p.team_fit) + '</td>' +
          '<td class="num">' + convRate(p.team_fit, p.technical) + '</td>' +
          '<td class="num">' + convRate(p.technical, p.cultural) + '</td>' +
          '<td class="num">' + convRate(p.cultural, p.offer) + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';

      html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
        '<div class="section-bar"></div>' +
        '<span class="section-title">Department Pipeline Overview</span>' +
        '<span class="section-count">(' + names.length + ' departments)</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Department</th><th class="num">Open Roles</th><th class="num">Positions</th>' +
        '<th class="num">Avg Age</th><th class="num">Candidates</th>' +
        '<th class="num">Early</th><th class="num">Screened</th>' +
        '<th class="num">Team Fit</th><th class="num">Technical</th>' +
        '<th class="num">Cultural</th><th class="num">Offer</th>' +
        '<th class="num">Filled 2026</th><th class="num">Avg TTF</th>' +
        '</tr></thead><tbody>';

      for (var di = 0; di < names.length; di++) {
        var dname = names[di];
        var d = dept[dname];
        var ps = d.per_stage;
        var postGate = ps.technical + ps.cultural + ps.offer;
        var flagged = (postGate === 0 && d.open_roles > 0) || (d.avg_age > 120 && d.open_roles > 0);
        var rowCls = flagged ? ' class="row-flagged"' : '';
        html += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(dname) + '</td>' +
          numCell(d.open_roles) +
          numCell(d.positions) +
          '<td class="num"' + (d.avg_age > 120 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + (d.avg_age > 0 ? d.avg_age.toFixed(0) + 'd' : '\u2014') + '</td>' +
          numCell(d.total_candidates) +
          numCell(ps.early) +
          numCell(ps.screened) +
          numCell(ps.team_fit) +
          numCell(ps.technical, 'highlight-post') +
          numCell(ps.cultural, 'highlight-cultural') +
          numCell(ps.offer, 'highlight-offer') +
          numCell(d.filled_2026, d.filled_2026 > 0 ? 'highlight-offer' : '') +
          '<td class="num">' + (d.avg_ttf > 0 ? d.avg_ttf.toFixed(0) + 'd' : '\u2014') + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';

      /* Department Passthrough Rates */
      html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
        '<div class="section-bar" style="background:var(--red)"></div>' +
        '<span class="section-title">Department Passthrough Rates</span>' +
        '<span class="section-count">(% of candidates advancing to next stage)</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Department</th>' +
        '<th class="num">Early &rarr; Screened</th>' +
        '<th class="num">Screened &rarr; Team Fit</th>' +
        '<th class="num">Team Fit &rarr; Technical</th>' +
        '<th class="num">Technical &rarr; Cultural</th>' +
        '<th class="num">Team Fit &rarr; Cultural</th>' +
        '<th class="num">Cultural &rarr; Offer</th>' +
        '</tr></thead><tbody>';

      for (var pi = 0; pi < names.length; pi++) {
        var pn = names[pi];
        var pd = dept[pn];
        var pp = pd.per_stage;
        function ptRate(from, to, threshold) {
          if (from === 0) return '\u2014';
          var pct = Math.round((to / from) * 100);
          var bad = threshold && pct < threshold && from > 3;
          return '<span' + (bad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + pct + '%</span>';
        }
        var tfToCultural = (pp.team_fit > 0) ? Math.round((pp.cultural / pp.team_fit) * 100) : 0;
        var tfToCulturalBad = pp.team_fit > 3 && tfToCultural < 15;
        var techToCultural = (pp.technical > 0) ? Math.round((pp.cultural / pp.technical) * 100) : 0;
        var techBad = pp.technical > 2 && techToCultural < 20;
        var rowCls = techBad ? ' class="row-flagged"' : '';
        html += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(pn) + '</td>' +
          '<td class="num">' + ptRate(pp.early, pp.screened) + '</td>' +
          '<td class="num">' + ptRate(pp.screened, pp.team_fit) + '</td>' +
          '<td class="num">' + ptRate(pp.team_fit, pp.technical) + '</td>' +
          '<td class="num"><span' + (techBad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + (pp.technical > 0 ? techToCultural + '%' : '\u2014') + '</span></td>' +
          '<td class="num"><span' + (tfToCulturalBad ? ' style="color:var(--orange);font-weight:700"' : '') + '>' + (pp.team_fit > 0 ? tfToCultural + '%' : '\u2014') + '</span></td>' +
          '<td class="num">' + ptRate(pp.cultural, pp.offer) + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';

      document.getElementById('tab-department').innerHTML = html;
    }

    /* ================================================================
       TAB: HIRING PERFORMANCE
       ================================================================ */
    function renderPerformance() {
      var pt = ANALYTICS.passthrough_rates;
      var html = '<div class="passthrough-row">' +
        '<div class="passthrough-card"><div class="passthrough-label">Screening &rarr; Team Fit</div><div class="passthrough-value">' + pt.screening_to_teamfit + '%</div></div>' +
        '<div class="passthrough-card"><div class="passthrough-label">Team Fit &rarr; Technical</div><div class="passthrough-value">' + pt.teamfit_to_technical + '%</div></div>' +
        '<div class="passthrough-card" style="border-left-color:var(--red)"><div class="passthrough-label">Technical &rarr; Cultural</div><div class="passthrough-value" style="color:var(--red)">' + pt.technical_to_cultural + '%</div></div>' +
        '<div class="passthrough-card" style="border-left-color:var(--orange)"><div class="passthrough-label">Team Fit &rarr; Cultural</div><div class="passthrough-value" style="color:var(--orange)">' + (pt.teamfit_to_cultural || 0) + '%</div><div style="font-size:10px;color:var(--text-dim)">compound</div></div>' +
        '<div class="passthrough-card"><div class="passthrough-label">Cultural &rarr; Offer</div><div class="passthrough-value">' + pt.cultural_to_offer + '%</div></div>' +
        '</div>';

      var roles = ANALYTICS.per_role_health.slice();
      roles.sort(function(a,b) { if (a.healthy === b.healthy) return 0; return a.healthy ? 1 : -1; });
      var unhealthyCount = roles.filter(function(r){ return !r.healthy; }).length;
      var healthyCount = roles.length - unhealthyCount;

      html += '<div class="section"><div class="section-header">' +
        '<div class="section-bar" style="background:var(--red)"></div>' +
        '<span class="section-title">Role Health Diagnosis</span>' +
        '<span class="section-count">(' + unhealthyCount + ' issues, ' + healthyCount + ' healthy)</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Role</th><th>Department</th><th>Recruiter</th><th>Health</th><th>Issue Type</th><th>Reason</th>' +
        '</tr></thead><tbody>';

      for (var ri = 0; ri < roles.length; ri++) {
        var r = roles[ri];
        var healthBadge = r.healthy
          ? '<span class="badge healthy">Healthy</span>'
          : '<span class="badge unhealthy">Unhealthy</span>';
        var issueBadge = '';
        if (r.issue) issueBadge = '<span class="issue-badge ' + r.issue + '">' + r.issue + '</span>';
        var rowCls = r.healthy ? '' : ' class="row-flagged"';
        html += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(r.name) + '</td>' +
          '<td class="dept-cell">' + escHtml(r.dept) + '</td>' +
          '<td class="recruiter-cell">' + escHtml(r.recruiter) + '</td>' +
          '<td>' + healthBadge + '</td>' +
          '<td>' + issueBadge + '</td>' +
          '<td style="font-size:13px;color:var(--text-dim);max-width:340px">' + (r.reason ? escHtml(r.reason) : '\u2014') + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';

      /* Stage Timing per Role */
      var roleTiming = ANALYTICS.role_timing || [];
      if (roleTiming.length > 0) {
        html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
          '<div class="section-bar" style="background:var(--orange)"></div>' +
          '<span class="section-title">Average Days in Stage per Role</span>' +
          '<span class="section-count">(flag: >7d in application/screening)</span>' +
          '</div>' +
          '<table class="data-table"><thead><tr>' +
          '<th>Role</th><th>Recruiter</th>' +
          '<th class="num">Screening</th>' +
          '<th class="num">Hireflix</th>' +
          '<th class="num">Team Fit</th>' +
          '<th class="num">Technical</th>' +
          '<th class="num">Overdue App</th>' +
          '<th class="num">Overdue Screen</th>' +
          '</tr></thead><tbody>';

        for (var ti = 0; ti < roleTiming.length; ti++) {
          var rt = roleTiming[ti];
          var hasOverdue = rt.overdue_application > 0 || rt.overdue_screening > 0;
          var rowCls = hasOverdue ? ' class="row-flagged"' : '';
          function daysCell(avg, count, threshold) {
            if (count === 0) return '<td class="num zero">—</td>';
            var bad = avg > threshold;
            return '<td class="num"' + (bad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + avg + 'd <span style="font-size:10px;color:var(--text-dim)">(' + count + ')</span></td>';
          }
          html += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(rt.name) + '</td>' +
            '<td class="recruiter-cell">' + escHtml(rt.recruiter) + '</td>' +
            daysCell(rt.avg_screening, rt.count_screening, 7) +
            daysCell(rt.avg_hireflix, rt.count_hireflix, 5) +
            daysCell(rt.avg_team_fit, rt.count_team_fit, 5) +
            daysCell(rt.avg_technical, rt.count_technical, 10) +
            '<td class="num"' + (rt.overdue_application > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rt.overdue_application + '</td>' +
            '<td class="num"' + (rt.overdue_screening > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rt.overdue_screening + '</td>' +
            '</tr>';
        }
        html += '</tbody></table></div>';
      }

      /* Monthly Tracker */
      var monthlyFills = ANALYTICS.monthly_fills || {};
      var monthlyFillsByTA = ANALYTICS.monthly_fills_by_ta || {};
      var monthlyScreensByTA = ANALYTICS.monthly_screens_by_ta || {};
      var allMonths = ANALYTICS.all_months || [];

      if (allMonths.length > 0) {
        var activeTAs = Object.keys(monthlyFillsByTA).filter(function(ta) {
          return Object.values(monthlyFillsByTA[ta]).reduce(function(s,v){return s+v},0) > 0 ||
                 (monthlyScreensByTA[ta] && Object.values(monthlyScreensByTA[ta]).reduce(function(s,v){return s+v},0) > 0);
        }).sort();

        html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
          '<div class="section-bar" style="background:var(--accent)"></div>' +
          '<span class="section-title">Monthly Hiring Tracker (2025-2026)</span>' +
          '</div>' +
          '<table class="data-table"><thead><tr>' +
          '<th>Month</th><th class="num">Fills</th>';
        for (var tai = 0; tai < activeTAs.length; tai++) {
          var firstName = activeTAs[tai].split(' ')[0];
          html += '<th class="num">' + escHtml(firstName) + ' Fills</th><th class="num">' + escHtml(firstName) + ' Screens</th>';
        }
        html += '</tr></thead><tbody>';

        var totalFillsAll = 0;
        for (var mi = 0; mi < allMonths.length; mi++) {
          var m = allMonths[mi];
          var fills = monthlyFills[m] || 0;
          totalFillsAll += fills;
          var isCurrentYear = m.startsWith('2026');
          html += '<tr' + (isCurrentYear ? ' style="background:#f0fdf4"' : '') + '>' +
            '<td class="role-cell">' + m + '</td>' +
            '<td class="num" style="font-weight:700">' + fills + '</td>';
          for (var tbi = 0; tbi < activeTAs.length; tbi++) {
            var ta = activeTAs[tbi];
            var taFills = (monthlyFillsByTA[ta] || {})[m] || 0;
            var taScreens = (monthlyScreensByTA[ta] || {})[m] || 0;
            html += numCell(taFills, taFills > 0 ? 'highlight-offer' : '') +
              numCell(taScreens, taScreens > 20 ? 'highlight-post' : '');
          }
          html += '</tr>';
        }

        html += '<tr style="font-weight:700;border-top:2px solid var(--border)">' +
          '<td class="role-cell">Total</td>' +
          '<td class="num">' + totalFillsAll + '</td>';
        for (var tci = 0; tci < activeTAs.length; tci++) {
          var taName = activeTAs[tci];
          var totalTAFills = Object.values(monthlyFillsByTA[taName] || {}).reduce(function(s,v){return s+v},0);
          var totalTAScreens = Object.values(monthlyScreensByTA[taName] || {}).reduce(function(s,v){return s+v},0);
          html += '<td class="num highlight-offer">' + totalTAFills + '</td><td class="num highlight-post">' + totalTAScreens + '</td>';
        }
        html += '</tr></tbody></table></div>';

        /* Trend indicator */
        var months2025 = allMonths.filter(function(m){return m.startsWith('2025')});
        var months2026 = allMonths.filter(function(m){return m.startsWith('2026')});
        var avg2025 = months2025.length > 0 ? Math.round(months2025.reduce(function(s,m){return s+(monthlyFills[m]||0)},0)/months2025.length * 10)/10 : 0;
        var avg2026 = months2026.length > 0 ? Math.round(months2026.reduce(function(s,m){return s+(monthlyFills[m]||0)},0)/months2026.length * 10)/10 : 0;
        var trend = avg2026 > avg2025 ? 'improving' : avg2026 < avg2025 ? 'declining' : 'stable';
        var trendColor = trend === 'improving' ? 'var(--green)' : trend === 'declining' ? 'var(--red)' : 'var(--accent)';
        html += '<div class="funnel-banner" style="margin-top:16px">' +
          '<strong>Trend:</strong> Avg fills/month — 2025: <strong>' + avg2025 + '</strong>, 2026: <strong style="color:' + trendColor + '">' + avg2026 + '</strong> (' + trend + ')' +
          '</div>';
      }

      document.getElementById('tab-performance').innerHTML = html;
    }

    /* ================================================================
       TAB: EFFECTIVENESS
       ================================================================ */
    function renderEffectiveness() {
      function normalizeRejections(raw) {
        var mapped = { 'TA Screening': 0, 'Team Fit': 0, 'Technical': 0, 'Cultural': 0, 'Offer': 0, 'Other': 0 };
        for (var stage in raw) {
          var count = raw[stage];
          var s = stage.toLowerCase().trim();
          if (s === 'ta screening' || s === 'ta first review' || s === 'hm screening' || s === 'hiring manager screening') mapped['TA Screening'] += count;
          else if (s === 'team fit' || s === 'meeting joeri - team fit') mapped['Team Fit'] += count;
          else if (s === 'technical' || s === 'technical case study & interview') mapped['Technical'] += count;
          else if (s === 'cultural' || s === 'cultural interview' || s === 'automated reference with zinc') mapped['Cultural'] += count;
          else if (s === 'offer') mapped['Offer'] += count;
          else if (s !== 'application review' && s !== 'unknown') mapped['Other'] += count;
        }
        return mapped;
      }

      var datasets = [
        { label: 'All Roles', raw: ANALYTICS.rejection_by_stage },
        { label: 'Excl. Intern', raw: ANALYTICS.rejection_by_stage_excl_intern },
        { label: 'Excl. Product & Tech', raw: ANALYTICS.rejection_by_stage_excl_product_tech }
      ];

      var html = '<div class="section"><div class="section-header">' +
        '<div class="section-bar"></div>' +
        '<span class="section-title">Rejection Analysis by Stage</span>' +
        '<span class="section-count">(post-screening rejections only)</span>' +
        '</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Filter</th>' +
        '<th class="num">TA Screening</th>' +
        '<th class="num">Team Fit</th>' +
        '<th class="num">Technical</th>' +
        '<th class="num">Cultural</th>' +
        '<th class="num">Offer</th>' +
        '<th class="num">Total</th>' +
        '</tr></thead><tbody>';

      for (var di = 0; di < datasets.length; di++) {
        var ds = datasets[di];
        var m = normalizeRejections(ds.raw);
        var total = m['TA Screening'] + m['Team Fit'] + m['Technical'] + m['Cultural'] + m['Offer'];
        function rejCell(count, total) {
          if (count === 0) return '<td class="num zero">0</td>';
          var pct = total > 0 ? (count / total * 100).toFixed(1) : '0.0';
          return '<td class="num"><strong>' + count + '</strong><br><span style="font-size:11px;color:var(--text-dim)">' + pct + '%</span></td>';
        }
        html += '<tr>' +
          '<td class="role-cell">' + ds.label + '</td>' +
          rejCell(m['TA Screening'], total) +
          rejCell(m['Team Fit'], total) +
          rejCell(m['Technical'], total) +
          rejCell(m['Cultural'], total) +
          rejCell(m['Offer'], total) +
          '<td class="num" style="font-weight:700">' + total + '</td>' +
          '</tr>';
      }
      html += '</tbody></table></div>';

      html += '<div class="funnel-banner" style="margin-top:20px">' +
        '<strong>Note:</strong> Application Review rejections excluded from above table. ' +
        'All roles: ' + (ANALYTICS.rejection_by_stage['Application Review'] || 0).toLocaleString() + ' &middot; ' +
        'Excl. Intern: ' + (ANALYTICS.rejection_by_stage_excl_intern['Application Review'] || 0).toLocaleString() + ' &middot; ' +
        'Excl. Product & Tech: ' + (ANALYTICS.rejection_by_stage_excl_product_tech['Application Review'] || 0).toLocaleString() +
        '</div>';

      /* Per-role rejection breakdown */
      var roleRej = ANALYTICS.per_role_rejections || [];
      if (roleRej.length > 0) {
        html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
          '<div class="section-bar" style="background:var(--red)"></div>' +
          '<span class="section-title">Per-Role Rejection Breakdown</span>' +
          '<span class="section-count">(post-review rejections by stage per role)</span>' +
          '</div>' +
          '<table class="data-table"><thead><tr>' +
          '<th>Role</th><th>Dept</th>' +
          '<th class="num">TA Screen</th><th class="num">% of total</th>' +
          '<th class="num">Team Fit</th><th class="num">% of total</th>' +
          '<th class="num">Technical</th><th class="num">% of total</th>' +
          '<th class="num">Cultural</th><th class="num">Offer</th>' +
          '<th class="num">Total</th><th>Signal</th>' +
          '</tr></thead><tbody>';

        for (var rri = 0; rri < roleRej.length; rri++) {
          var rr = roleRej[rri];
          var taPct = rr.total > 0 ? Math.round(rr.ta_screening / rr.total * 100) : 0;
          var tfPct = rr.total > 0 ? Math.round(rr.team_fit / rr.total * 100) : 0;
          var techPct = rr.total > 0 ? Math.round(rr.technical / rr.total * 100) : 0;

          var signal = '';
          if (taPct > 80 && rr.ta_screening > 20) signal = '<span class="issue-badge quality">TA calibration</span>';
          else if (tfPct > 30 && rr.team_fit > 5) signal = '<span class="issue-badge calibration">Team Fit gatekeeper</span>';
          else if (techPct > 30 && rr.technical > 5) signal = '<span class="issue-badge risk">Tech drop-off</span>';
          else if (rr.offer > 0) signal = '<span class="issue-badge sustainability">Offer decline</span>';

          var rowCls = signal ? ' class="row-flagged"' : '';
          html += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(rr.name) + '</td>' +
            '<td class="dept-cell">' + escHtml(rr.dept) + '</td>' +
            numCell(rr.ta_screening) +
            '<td class="num" style="font-size:11px;color:var(--text-dim)">' + taPct + '%</td>' +
            numCell(rr.team_fit, tfPct > 30 && rr.team_fit > 5 ? 'highlight-cultural' : '') +
            '<td class="num" style="font-size:11px;color:var(--text-dim)">' + tfPct + '%</td>' +
            numCell(rr.technical, techPct > 30 && rr.technical > 5 ? 'highlight-post' : '') +
            '<td class="num" style="font-size:11px;color:var(--text-dim)">' + techPct + '%</td>' +
            numCell(rr.cultural) +
            numCell(rr.offer) +
            '<td class="num" style="font-weight:700">' + rr.total + '</td>' +
            '<td>' + signal + '</td>' +
            '</tr>';
        }
        html += '</tbody></table></div>';
      }

      /* Funnel Efficiency per role */
      var funnel = ANALYTICS.funnel_efficiency || [];
      if (funnel.length > 0) {
        funnel.sort(function(a,b){ return b.screens_per_technical - a.screens_per_technical; });
        html += '<div class="section" style="margin-top:32px"><div class="section-header">' +
          '<div class="section-bar" style="background:var(--orange)"></div>' +
          '<span class="section-title">Funnel Efficiency per Role</span>' +
          '<span class="section-count">(TA screens needed to advance candidates)</span>' +
          '</div>' +
          '<table class="data-table"><thead><tr>' +
          '<th>Role</th><th>Dept</th>' +
          '<th class="num">TA Screens</th>' +
          '<th class="num">Entered Team Fit</th>' +
          '<th class="num">Screens / Team Fit</th>' +
          '<th class="num">Entered Technical</th>' +
          '<th class="num">Screens / Technical</th>' +
          '<th class="num">TF &rarr; Tech %</th>' +
          '<th>Flags</th>' +
          '</tr></thead><tbody>';

        for (var fi = 0; fi < funnel.length; fi++) {
          var fe = funnel[fi];
          if (fe.ta_screens === 0) continue;
          var flags = [];
          if (fe.screens_per_teamfit > 5 && fe.ta_screens > 5) flags.push('<span class="issue-badge quality">TA &gt;5 per TF</span>');
          if (fe.screens_per_technical > 10 && fe.ta_screens > 5) flags.push('<span class="issue-badge risk">TA &gt;10 per Tech</span>');
          if (fe.tf_to_tech_pct < 30 && fe.team_fit_entered > 3) flags.push('<span class="issue-badge calibration">HM calibration</span>');
          var rowCls = flags.length > 0 ? ' class="row-flagged"' : '';
          var sptf = fe.screens_per_teamfit >= 999 ? '\u2014' : fe.screens_per_teamfit.toFixed(1);
          var sptech = fe.screens_per_technical >= 999 ? '\u2014' : fe.screens_per_technical.toFixed(1);
          html += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(fe.name) + '</td>' +
            '<td class="dept-cell">' + escHtml(fe.dept) + '</td>' +
            numCell(fe.ta_screens) +
            numCell(fe.team_fit_entered) +
            '<td class="num"' + (fe.screens_per_teamfit > 5 && fe.ta_screens > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + sptf + '</td>' +
            numCell(fe.technical_entered, fe.technical_entered > 0 ? 'highlight-post' : '') +
            '<td class="num"' + (fe.screens_per_technical > 10 && fe.ta_screens > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + sptech + '</td>' +
            '<td class="num"' + (fe.tf_to_tech_pct < 30 && fe.team_fit_entered > 3 ? ' style="color:var(--orange);font-weight:700"' : '') + '>' + (fe.team_fit_entered > 0 ? fe.tf_to_tech_pct + '%' : '\u2014') + '</td>' +
            '<td>' + flags.join(' ') + '</td>' +
            '</tr>';
        }
        html += '</tbody></table></div>';
      }

      document.getElementById('tab-effectiveness').innerHTML = html;
    }

    /* ================================================================
       TAB: OVERVIEW
       ================================================================ */
    function renderOverview() {
      var internJobs = jobs.filter(function(j){ return /intern/i.test(j.name); });
      var fullTimeJobs = jobs.filter(function(j){ return !/intern/i.test(j.name); });
      var totalOpenPositions = fullTimeJobs.reduce(function(s,j){return s+j.positions},0);
      var atRiskJobs = jobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; });
      var unhealthy = ANALYTICS.per_role_health.filter(function(r){ return !r.healthy; });
      var pt = ANALYTICS.passthrough_rates;

      var html = '<div class="kpi-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">' +
        '<div class="kpi-card" style="border-left:4px solid var(--text)"><div class="kpi-label">Open Positions</div><div class="kpi-value">' + totalOpenPositions + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">2026 Filled</div><div class="kpi-value" style="color:var(--green)">' + totalFilled + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--accent)"><div class="kpi-label">Avg TTF</div><div class="kpi-value">' + avgTTF + '<span style="font-size:18px">d</span></div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--red)"><div class="kpi-label">At Risk / Unhealthy</div><div class="kpi-value" style="color:var(--red)">' + atRiskJobs.length + ' / ' + unhealthy.length + '</div></div>' +
        '</div>';

      html += '<div class="funnel-banner">' +
        '<strong>Pipeline Passthrough Rates:</strong> ' +
        'Screening &rarr; Team Fit: <strong>' + pt.screening_to_teamfit + '%</strong>' +
        '<span class="funnel-arrow"> | </span>' +
        'Team Fit &rarr; Technical: <strong>' + pt.teamfit_to_technical + '%</strong>' +
        '<span class="funnel-arrow"> | </span>' +
        'Technical &rarr; Cultural: <strong style="color:var(--red)">' + pt.technical_to_cultural + '%</strong>' +
        '<span class="funnel-arrow"> | </span>' +
        'Team Fit &rarr; Cultural: <strong style="color:var(--orange)">' + (pt.teamfit_to_cultural || 0) + '%</strong>' +
        '<span class="funnel-arrow"> | </span>' +
        'Cultural &rarr; Offer: <strong>' + pt.cultural_to_offer + '%</strong>' +
        '</div>';

      if (unhealthy.length > 0) {
        html += '<div class="section"><div class="section-header">' +
          '<div class="section-bar" style="background:var(--red)"></div>' +
          '<span class="section-title">Roles Needing Attention</span>' +
          '<span class="section-count">(' + unhealthy.length + ')</span>' +
          '</div><div class="empty-grid">';
        for (var ui = 0; ui < unhealthy.length; ui++) {
          var u = unhealthy[ui];
          html += '<div class="empty-card" style="border-left:3px solid var(--red)"><div>' +
            '<div class="name">' + escHtml(u.name) + '</div>' +
            '<div class="meta">' + escHtml(u.dept) + ' &middot; ' + escHtml(u.recruiter) +
            ' &middot; <span class="issue-badge ' + u.issue + '">' + u.issue + '</span></div>' +
            '</div></div>';
        }
        html += '</div></div>';
      }

      document.getElementById('tab-overview').innerHTML = html;
    }

    /* Render all tabs */
    renderPipeline();
    renderRecruiter();
    renderDepartment();
    renderPerformance();
    renderEffectiveness();
    renderOverview();
  </script>
</body>
</html>
