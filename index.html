<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Health Dashboard</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --white: #ffffff;
      --text: #1e2a3a;
      --text-dim: #6b7a8d;
      --border: #e2e6ec;
      --accent: #0ea5a0;
      --green: #0ea570;
      --green-bg: #e6f7ef;
      --orange: #e07a2f;
      --orange-bg: #fdf0e4;
      --teal: #0ea5a0;
      --teal-bg: #e0f5f4;
      --red: #d94052;
      --red-bg: #fde8eb;
      --gray: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 48px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
      padding-top: 20px;
      background: var(--white);
      padding-left: 32px;
      padding-right: 32px;
    }
    .tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 26px;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .kpi-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1.5px;
      color: var(--text);
    }

    /* Funnel Banner */
    .funnel-banner {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 14px 22px;
      margin-bottom: 32px;
      font-size: 14px;
      color: var(--text-dim);
    }
    .funnel-banner strong { color: var(--text); font-weight: 600; }
    .funnel-banner .gate { color: var(--red); font-weight: 700; }
    .funnel-arrow { color: var(--gray); margin: 0 4px; }

    /* Section */
    .section { margin-bottom: 32px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      padding-left: 4px;
    }
    .section-bar {
      width: 4px;
      height: 20px;
      border-radius: 2px;
      background: var(--accent);
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-count { font-size: 14px; color: var(--text-dim); }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .data-table thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
      white-space: nowrap;
    }
    .data-table thead th.num { text-align: center; }
    .data-table tbody tr { transition: background 0.1s; }
    .data-table tbody tr:hover { background: #f8f9fb; }
    .data-table tbody tr:not(:last-child) td { border-bottom: 1px solid #f0f2f5; }
    .data-table tbody td {
      padding: 14px 16px;
      font-size: 14px;
      vertical-align: middle;
    }
    .data-table tbody td.num {
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .data-table tbody td.role-cell { font-weight: 600; max-width: 240px; }
    .data-table tbody td.dept-cell { color: var(--text-dim); }
    .data-table tbody td.age-cell { font-variant-numeric: tabular-nums; }
    .data-table tbody td.recruiter-cell { color: var(--text-dim); font-size: 13px; }
    .data-table tbody td.hires-cell { font-weight: 700; font-variant-numeric: tabular-nums; }

    /* Health Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge.on_track  { background: var(--green-bg); color: var(--green); }
    .badge.secured   { background: var(--teal-bg);  color: var(--teal); }
    .badge.covered   { background: var(--teal-bg);  color: var(--teal); }
    .badge.at_risk   { background: var(--orange-bg); color: var(--orange); }
    .badge.empty     { background: #f1f5f9;         color: var(--gray); }
    .badge.healthy   { background: var(--green-bg); color: var(--green); }
    .badge.unhealthy { background: var(--red-bg);   color: var(--red); }

    .highlight-post { color: var(--accent); font-weight: 700 !important; }
    .highlight-cultural { color: #d97706; font-weight: 700 !important; }
    .highlight-offer { color: var(--green); font-weight: 700 !important; }
    .zero { color: #c5cdd8; }

    /* SLA Badges */
    .sla-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .pos-multi {
      color: var(--accent) !important;
      font-weight: 700 !important;
    }
    .sla-badge.overdue { background: var(--red); color: #fff; }
    .sla-badge.warning { background: var(--orange); color: #fff; }
    .sla-badge.filling { background: var(--green); color: #fff; }

    /* Empty section */
    .empty-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .empty-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .empty-card .name { font-size: 14px; font-weight: 600; }
    .empty-card .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .empty-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #e2e6ec;
    }

    /* Collapsible sections */
    .collapsible-header {
      cursor: pointer;
      user-select: none;
    }
    .collapsible-header::before {
      content: '▼';
      display: inline-block;
      font-size: 10px;
      margin-right: 8px;
      transition: transform 0.2s;
      color: var(--text-dim);
    }
    .collapsible-header.collapsed::before {
      transform: rotate(-90deg);
    }
    .collapsible-body {
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .collapsible-body.collapsed {
      max-height: 0 !important;
      overflow: hidden;
    }

    /* Issue type badges */
    .issue-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .issue-badge.quality      { background: #fef3c7; color: #92400e; }
    .issue-badge.calibration  { background: #ede9fe; color: #5b21b6; }
    .issue-badge.risk         { background: var(--red-bg); color: var(--red); }
    .issue-badge.sustainability { background: var(--orange-bg); color: var(--orange); }
    .issue-badge.stakeholder  { background: #dbeafe; color: #1e40af; }

    /* Red-flagged row */
    .row-flagged td { background: #fff5f5 !important; }

    /* Tab content containers */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Passthrough rate cards */
    .passthrough-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }
    .passthrough-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 18px 22px;
      text-align: center;
    }
    .passthrough-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .passthrough-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent);
    }

    @media (max-width: 1000px) {
      .kpi-row { grid-template-columns: 1fr; }
      .passthrough-row { grid-template-columns: repeat(2, 1fr); }
      .data-table { font-size: 12px; }
    }
  </style>
</head>

    var avg2025 = opened2025.length > 0 ? Math.round(opened2025.reduce(function(s,f){return s+f.ttf_days},0)/opened2025.length) : 0;

    /* ================================================================
       TAB: PIPELINE HEALTH
       ================================================================ */
    function renderPipeline() {
      var groups = {};
      for (var i = 0; i < jobs.length; i++) {
        var j = jobs[i];
        var sec;
        if (j.health === 'at_risk') sec = 'at_risk_section';
        else if (j.section !== 'offer' && (j.technical + j.cultural) >= 3) sec = 'likely_to_fill';
        else sec = j.section;
        if (!groups[sec]) groups[sec] = [];
        groups[sec].push(j);
      }

      var likelyToFill14d = jobs.filter(function(j){ return (j.technical + j.cultural) >= 3 || j.offer > 0; });
      var likelyWithinSLA = jobs.filter(function(j){ return (j.technical + j.cultural + j.offer) > 0 && j.sla_remaining >= 0; });
      var atRiskJobs = jobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; });
      var mgrDelays = ANALYTICS.manager_delays || {};
      var mgrDelayCount = Object.keys(mgrDelays).length;
      var severeCount = 0;
      for (var dk in mgrDelays) { severeCount += mgrDelays[dk].hireflix_severe + mgrDelays[dk].tech_severe; }
      var fill14Names = likelyToFill14d.map(function(j){return j.name});
      var slaNames = likelyWithinSLA.map(function(j){return j.name});
      var internJobs = jobs.filter(function(j){ return /intern/i.test(j.name); });
      var fullTimeJobs = jobs.filter(function(j){ return !/intern/i.test(j.name); });
      var totalOpenPositions = fullTimeJobs.reduce(function(s,j){return s+j.positions},0);
      var internPositions = internJobs.reduce(function(s,j){return s+j.positions},0);
      var likelyToHireCount = jobs.filter(function(j){return (j.technical + j.cultural + j.offer) > 0}).length;

      var html = '<div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:12px">' +
        '<div class="kpi-card" style="border-left:4px solid var(--text)"><div class="kpi-label">Open Positions</div><div class="kpi-value">' + totalOpenPositions + '<span style="font-size:18px;color:var(--text-dim)"> + ' + internPositions + ' intern</span></div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + fullTimeJobs.length + ' roles + ' + internJobs.length + ' intern, ' + likelyToHireCount + ' likely to hire</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">Likely to Fill (14d)</div><div class="kpi-value" style="color:var(--green)">' + likelyToFill14d.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + fill14Names.slice(0,3).join(', ') + (fill14Names.length > 3 ? '...' : '') + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--accent)"><div class="kpi-label">Likely to Hire Within SLA</div><div class="kpi-value" style="color:var(--accent)">' + likelyWithinSLA.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + slaNames.slice(0,3).join(', ') + (slaNames.length > 3 ? '...' : '') + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--red)"><div class="kpi-label">At Risk</div><div class="kpi-value" style="color:var(--red)">' + atRiskJobs.length + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">No candidates past Team Fit</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--orange)"><div class="kpi-label">Positions with Manager Delays</div><div class="kpi-value" style="color:var(--orange)">' + mgrDelayCount + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + severeCount + ' severe (10d+)</div></div>' +
        '</div>';

      var offerDecline = ANALYTICS.offer_decline_2026 || {accepted:0,declined:0,total:0,decline_rate:0};
      html += '<div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:12px">' +
        '<div class="kpi-card"><div class="kpi-label">Weighted Pipeline</div><div class="kpi-value">' + kpis.weighted_pipeline + '</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">2026 Filled</div><div class="kpi-value" style="color:var(--green)">' + totalFilled + '</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">Avg. ' + avgTTF + 'd TTF</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--green)"><div class="kpi-label">Within 60d SLA</div><div class="kpi-value" style="color:var(--green)">' + slaRate + '%</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + withinSLA + ' of ' + totalFilled + ' &middot; ' + overSLA + ' over</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--orange)"><div class="kpi-label">Offer Decline</div><div class="kpi-value" style="color:var(--orange)">' + offerDecline.decline_rate + '%</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + offerDecline.declined + ' of ' + offerDecline.total + ' offers</div></div>' +
        '<div class="kpi-card" style="border-left:4px solid var(--accent)"><div class="kpi-label">2026 Hired</div><div class="kpi-value">' + opened2026.length + '</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px"><span style="font-size:10px">2025 carry-over:</span> ' + opened2025.length + ' <span style="font-size:10px">(avg ' + avg2025 + 'd)</span></div></div>' +
        '</div>';

      html += '<div class="funnel-banner">' +
        '<strong>Funnel Order (Technical is critical gate):</strong> ' +
        'App <span class="funnel-arrow">&rarr;</span> ' +
        'HM Review <span class="funnel-arrow">&rarr;</span> ' +
        'TA Screening <span class="funnel-arrow">&rarr;</span> ' +
        'Team Fit <span class="funnel-arrow">&rarr;</span> ' +
        '<span class="gate">Technical Interview (82% drop)</span> <span class="funnel-arrow">&rarr;</span> ' +
        'Culture Interview <span class="funnel-arrow">&rarr;</span> ' +
        'Offer</div>';

      for (var si = 0; si < SECTION_ORDER.length; si++) {
        var sec = SECTION_ORDER[si];
        var sJobs = groups[sec];
        if (!sJobs || sJobs.length === 0) continue;
        var barColor = sec === 'at_risk_section' ? 'var(--red)' : (sec === 'offer' || sec === 'likely_to_fill') ? 'var(--green)' : 'var(--accent)';

        var secContent = '';
        if (sec === 'empty') {
          secContent += '<div class="empty-grid">';
          for (var ei = 0; ei < sJobs.length; ei++) {
            var ej = sJobs[ei];
            secContent += '<div class="empty-card"><div>' +
              '<div class="name">' + ej.name + '</div>' +
              '<div class="meta">' + ej.dept + (ej.recruiter ? ' &middot; ' + ej.recruiter : '') + '</div>' +
              '</div><div class="empty-dot"></div></div>';
          }
          secContent += '</div>';
        } else {
          secContent += '<table class="data-table"><thead><tr>' +
            '<th>Role</th><th class="num">Pos.</th><th>Dept</th><th>Pipeline Age</th><th>Health</th>' +
            '<th class="num">Early</th><th class="num">Screened</th>' +
            '<th class="num">Pre-Gate</th><th class="num">Technical</th>' +
            '<th class="num">Cultural</th><th class="num">Offer</th>' +
            '<th class="num">Exp. Hires</th><th>Recruiter</th>' +
            '</tr></thead><tbody>';

          for (var ji = 0; ji < sJobs.length; ji++) {
            var j = sJobs[ji];
            var slaIcon = '';
            if (j.sla_status === 'overdue') slaIcon = '<span class="sla-badge overdue">' + Math.abs(j.sla_remaining) + 'd over</span>';
            else if (j.sla_status === 'warning') slaIcon = '<span class="sla-badge warning">' + j.sla_remaining + 'd left</span>';
            else if (j.sla_status === 'filling') slaIcon = '<span class="sla-badge filling">Filling</span>';
            var posCell = j.positions > 1 ? '<td class="num pos-multi">' + j.positions + '</td>' : '<td class="num">' + j.positions + '</td>';
            secContent += '<tr>' +
              '<td class="role-cell">' + j.name + '</td>' +
              posCell +
              '<td class="dept-cell">' + j.dept + '</td>' +
              '<td class="age-cell">' + j.age_days + 'd ' + slaIcon + '</td>' +
              '<td><span class="badge ' + j.health + '">' + (HEALTH_LABELS[j.health] || j.health) + '</span></td>' +
              numCell(j.early) +
              numCell(j.screened) +
              numCell(j.pre_gate) +
              numCell(j.technical, 'highlight-post') +
              numCell(j.cultural, 'highlight-cultural') +
              numCell(j.offer, 'highlight-offer') +
              '<td class="hires-cell">' + j.exp_hires.toFixed(2) + '</td>' +
              '<td class="recruiter-cell">' + (j.recruiter || '\u2014') + '</td>' +
              '</tr>';
          }
          secContent += '</tbody></table>';
        }
        html += collapsibleSection(SECTION_LABELS[sec], '(' + sJobs.length + ' role' + (sJobs.length > 1 ? 's' : '') + ')', barColor, secContent);
      }

      /* 2026 Hired table */
      var grouped = {};
      for (var fi = 0; fi < FILLED.length; fi++) {
        var f = FILLED[fi];
        var key = f.job_name;
        if (!grouped[key]) grouped[key] = { job_name: f.job_name, dept: f.dept, recruiter: f.recruiter, fills: [] };
        grouped[key].fills.push(f.ttf_days);
      }
      var rows = Object.values(grouped).sort(function(a,b) {
        var avgA = a.fills.reduce(function(s,v){return s+v},0)/a.fills.length;
        var avgB = b.fills.reduce(function(s,v){return s+v},0)/b.fills.length;
        return avgA - avgB;
      });

      var hiredHtml = '<table class="data-table"><thead><tr>' +
        '<th>Role</th><th>Dept</th><th class="num">Filled</th>' +
        '<th class="num">Avg. TTF (days)</th><th>SLA</th><th>Recruiter</th>' +
        '</tr></thead><tbody>';

      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        var count = row.fills.length;
        var avg = Math.round(row.fills.reduce(function(s,v){return s+v},0)/count);
        var slaCls = avg <= 60 ? 'badge on_track' : 'badge at_risk';
        var slaLabel = avg <= 60 ? 'Within SLA' : 'Over SLA';
        var ttfCls = avg <= 60 ? '' : 'style="color:var(--red);font-weight:700"';
        var countCls = count > 1 ? ' class="num pos-multi"' : ' class="num"';
        hiredHtml += '<tr>' +
          '<td class="role-cell">' + row.job_name + '</td>' +
          '<td class="dept-cell">' + row.dept + '</td>' +
          '<td' + countCls + '>' + count + '</td>' +
          '<td class="num" ' + ttfCls + '>' + avg + '</td>' +
          '<td><span class="' + slaCls + '">' + slaLabel + '</span></td>' +
          '<td class="recruiter-cell">' + row.recruiter + '</td>' +
          '</tr>';
      }
      hiredHtml += '</tbody></table>';
      html += '<div style="margin-top:48px;border-top:2px solid var(--border);padding-top:32px">' + collapsibleSection('2026 Hired', '(' + totalFilled + ' positions filled)', 'var(--green)', hiredHtml) + '</div>';
      /* Year-over-Year Monthly Comparison */
      var monthlyFillsYoY = ANALYTICS.monthly_fills || {};
      var yoyHtml = '<table class="data-table"><thead><tr>' +
        '<th>Month</th><th class="num">2025</th><th class="num">2026</th><th class="num">Change</th><th>Trend</th>' +
        '</tr></thead><tbody>';
      var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      for (var mni = 0; mni < 12; mni++) {
        var mm = String(mni+1).padStart(2,'0');
        var fills25 = monthlyFillsYoY['2025-' + mm] || 0;
        var fills26 = monthlyFillsYoY['2026-' + mm] || 0;
        if (fills25 === 0 && fills26 === 0) continue;
        var diff = fills26 - fills25;
        var diffStr = diff > 0 ? '+' + diff : diff === 0 ? '\u2014' : String(diff);
        var diffColor = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-dim)';
        var arrow = diff > 0 ? '&#9650;' : diff < 0 ? '&#9660;' : '&#9644;';
        yoyHtml += '<tr><td class="role-cell">' + monthNames[mni] + '</td>' +
          numCell(fills25) + '<td class="num" style="font-weight:700">' + fills26 + '</td>' +
          '<td class="num" style="color:' + diffColor + ';font-weight:700">' + diffStr + '</td>' +
          '<td style="color:' + diffColor + '">' + arrow + '</td></tr>';
      }
      yoyHtml += '</tbody></table>';
      html += collapsibleSection('Year-over-Year Monthly Comparison', '', 'var(--green)', yoyHtml);

      document.getElementById('tab-pipeline').innerHTML = html;
    }

    /* ================================================================
       TAB: RECRUITER
       ================================================================ */
    function renderRecruiter() {
      var rec = ANALYTICS.per_recruiter;
      var names = Object.keys(rec).sort(function(a,b) {
        return rec[b].open_roles - rec[a].open_roles || a.localeCompare(b);
      });
      var activeRecruiters = names.filter(function(n){ return (rec[n].open_roles > 0 || rec[n].filled_2026 > 0) && EXCLUDE_TA.indexOf(n) === -1; });

      /* Pipeline per TA summary cards */
      var taWhitelist = ['W1','W3','W2','W4'];
      var taScreens = ANALYTICS.recruiter_ta_screens || {};
      var mgrDelays = ANALYTICS.manager_delays || {};
      var html = '<div class="kpi-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">';
      for (var twi = 0; twi < taWhitelist.length; twi++) {
        var twName = taWhitelist[twi];
        var twRec = rec[twName] || {};
        var twFirst = twName.split(' ')[0];
        // compute pipeline stats from jobs data
        var twJobs = jobs.filter(function(j){ return j.recruiter === twName; });
        var twOpenRoles = twJobs.length;
        var twTotalCands = twJobs.reduce(function(s,j){ return s + j.total; }, 0);
        var twTechPlus = twJobs.reduce(function(s,j){ return s + j.technical + j.cultural + j.offer; }, 0);
        var twAtRisk = twJobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; }).length;
        var twAtRiskPct = twOpenRoles > 0 ? Math.round((twAtRisk / twOpenRoles) * 100) : 0;
        var twAvgAge = twOpenRoles > 0 ? Math.round(twJobs.reduce(function(s,j){ return s + j.age_days; }, 0) / twOpenRoles) : 0;
        var twBorder = twAtRisk > 1 ? 'var(--red)' : twAtRiskPct > 30 ? 'var(--orange)' : 'var(--green)';
        html += '<div class="kpi-card" style="border-left:4px solid ' + twBorder + ';padding:16px 20px">' +
          '<div class="kpi-label">' + escHtml(twFirst) + '</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:6px;font-size:13px">' +
          '<div><span style="color:var(--text-dim)">Open Roles</span><br><strong>' + twOpenRoles + '</strong></div>' +
          '<div><span style="color:var(--text-dim)">Pipeline</span><br><strong>' + twTotalCands + '</strong></div>' +
          '<div><span style="color:var(--text-dim)">Technical+</span><br><strong style="color:var(--accent)">' + twTechPlus + '</strong></div>' +
          '<div><span style="color:var(--text-dim)">At Risk</span><br><strong style="color:' + (twAtRisk > 0 ? 'var(--red)' : 'var(--green)') + '">' + twAtRiskPct + '%</strong> <span style="font-size:11px;color:var(--text-dim)">(' + twAtRisk + ')</span></div>' +
          '<div><span style="color:var(--text-dim)">Avg Age</span><br><strong>' + twAvgAge + 'd</strong></div>' +
          '<div><span style="color:var(--text-dim)">Filled 2026</span><br><strong style="color:var(--green)">' + (twRec.filled_2026 || 0) + '</strong></div>' +
          '</div></div>';
      }
      html += '</div>';

      var recMetricsHtml = '<table class="data-table"><thead><tr>' +
        '<th>Recruiter</th><th class="num">Open Roles</th><th class="num">Filled 2026</th>' +
        '<th class="num">Avg TTF</th><th class="num">SLA Rate</th>' +
        '<th class="num">At Risk</th><th class="num">TA Screens</th><th class="num">Roles Screened</th>' +
        '</tr></thead><tbody>';

      for (var ni = 0; ni < names.length; ni++) {
        var name = names[ni];
        var rd = rec[name];
        if (rd.open_roles === 0 && rd.filled_2026 === 0) continue;
        if (EXCLUDE_TA.indexOf(name) !== -1) continue;
        var atRiskRatio = rd.open_roles > 0 ? (rd.at_risk / rd.open_roles) : 0;
        var flagged = (atRiskRatio > 0.3 && rd.at_risk > 0) || (rd.sla_rate > 0 && rd.sla_rate < 40);
        var rowCls = flagged ? ' class="row-flagged"' : '';
        var ts = taScreens[name] || {ta_screens:0, roles_screened:0};
        recMetricsHtml += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(name) + '</td>' +
          numCell(rd.open_roles) +
          numCell(rd.filled_2026, rd.filled_2026 > 0 ? 'highlight-offer' : '') +
          '<td class="num">' + (rd.avg_ttf > 0 ? rd.avg_ttf.toFixed(0) + 'd' : '\u2014') + '</td>' +
          '<td class="num"' + (rd.sla_rate > 0 && rd.sla_rate < 40 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + (rd.sla_rate > 0 ? rd.sla_rate.toFixed(0) + '%' : '\u2014') + '</td>' +
          '<td class="num"' + (rd.at_risk > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rd.at_risk + '</td>' +
          numCell(ts.ta_screens, ts.ta_screens > 50 ? 'highlight-post' : '') +
          numCell(ts.roles_screened) +
          '</tr>';
      }
      recMetricsHtml += '</tbody></table>';
      html += collapsibleSection('Recruiter Metrics', '(2026 open roles only)', 'var(--accent)', recMetricsHtml);

      /* SLA Attainment per TA */
      var taSLA = ANALYTICS.ta_sla_attainment || {};
      var HANDOFF_ROLES = ['Account Executive DACH, Amsterdam', 'Account Executive New York', 'Senior Account Manager'];
      var HANDOFF_DATE = '2026-04-01';

      // Recalculate Laine's SLA excluding handoff roles
      var laineSLA = taSLA['W2'];
      if (laineSLA) {
        var laineFiltered = {total: 0, within_sla: 0, over_sla: 0, over_sla_roles: []};
        for (var lri = 0; lri < (laineSLA.over_sla_roles || []).length; lri++) {
          if (HANDOFF_ROLES.indexOf(laineSLA.over_sla_roles[lri].role) === -1) {
            laineFiltered.over_sla_roles.push(laineSLA.over_sla_roles[lri]);
          }
        }
        // Remove 3 handoff roles from totals
        var handoffOver = 0;
        for (var hri = 0; hri < (laineSLA.over_sla_roles || []).length; hri++) {
          if (HANDOFF_ROLES.indexOf(laineSLA.over_sla_roles[hri].role) !== -1) handoffOver++;
        }
        laineFiltered.total = laineSLA.total - HANDOFF_ROLES.length;
        laineFiltered.over_sla = laineSLA.over_sla - handoffOver;
        laineFiltered.within_sla = laineFiltered.total - laineFiltered.over_sla;
        laineFiltered.sla_rate = laineFiltered.total > 0 ? Math.round(laineFiltered.within_sla / laineFiltered.total * 100) : 0;
        taSLA['W2'] = laineFiltered;
      }

      var slaHtml = '<div class="kpi-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">';
      for (var si = 0; si < taWhitelist.length; si++) {
        var sn = taWhitelist[si];
        var sd = taSLA[sn] || {total:0, within_sla:0, over_sla:0, sla_rate:0, over_sla_roles:[]};
        var sColor = sd.sla_rate >= 70 ? 'var(--green)' : sd.sla_rate >= 40 ? 'var(--orange)' : 'var(--red)';
        slaHtml += '<div class="kpi-card" style="border-left:4px solid ' + sColor + '">' +
          '<div class="kpi-label">' + sn.split(' ')[0] + ' SLA</div>' +
          '<div class="kpi-value" style="color:' + sColor + '">' + sd.sla_rate + '%</div>' +
          '<div style="font-size:12px;color:var(--text-dim)">' + sd.within_sla + '/' + sd.total + ' within 60d &middot; ' + sd.over_sla + ' over</div>';
        if (sd.over_sla_roles && sd.over_sla_roles.length > 0) {
          slaHtml += '<div style="font-size:11px;color:var(--red);margin-top:4px">';
          var overRoles = sd.over_sla_roles.slice(0, 3);
          for (var ori = 0; ori < overRoles.length; ori++) {
            slaHtml += escHtml(overRoles[ori].role) + ' (' + overRoles[ori].ttf + 'd)' + (ori < overRoles.length-1 ? ', ' : '');
          }
          if (sd.over_sla_roles.length > 3) slaHtml += '...';
          slaHtml += '</div>';
        }
        slaHtml += '</div>';
      }
      slaHtml += '</div>';
      html += collapsibleSection('SLA Attainment per TA', '(based on position open dates)', 'var(--green)', slaHtml);

      /* Role Handoff Tracker: Laine → Luuk (April 1, 2026) */
      var handoffData = [
        {role: 'Account Executive DACH, Amsterdam', posOpened: '2025-11-18', dept: 'Sales'},
        {role: 'Account Executive New York', posOpened: '2025-12-23', dept: 'Sales'},
        {role: 'Senior Account Manager', posOpened: '2026-01-28', dept: 'Sales'},
      ];
      var handoffHtml = '<div class="funnel-banner" style="margin-bottom:16px">' +
        '<strong>Handoff:</strong> These 3 Sales roles transferred from <strong>W2</strong> to <strong>W14</strong> on April 1, 2026. ' +
        'Days are split by ownership period.</div>' +
        '<table class="data-table"><thead><tr>' +
        '<th>Role</th><th>Dept</th><th class="num">Position Opened</th>' +
        '<th class="num">Days under Laine</th><th class="num">Days under Luuk</th>' +
        '<th class="num">Total Age</th><th>Current Owner</th>' +
        '</tr></thead><tbody>';

      var today = new Date();
      var handoffDate = new Date('2026-04-01');
      for (var hi = 0; hi < handoffData.length; hi++) {
        var hd = handoffData[hi];
        var posDate = new Date(hd.posOpened);
        var daysLaine = Math.round((handoffDate - posDate) / 86400000);
        var daysLuuk = Math.max(0, Math.round((today - handoffDate) / 86400000));
        var totalAge = daysLaine + daysLuuk;
        var slaStatus = totalAge > 60 ? '<span class="sla-badge overdue">' + (totalAge - 60) + 'd over</span>' : '';
        handoffHtml += '<tr>' +
          '<td class="role-cell">' + escHtml(hd.role) + '</td>' +
          '<td class="dept-cell">' + hd.dept + '</td>' +
          '<td class="num">' + hd.posOpened + '</td>' +
          '<td class="num" style="color:var(--text-dim)">' + daysLaine + 'd</td>' +
          '<td class="num" style="color:var(--accent);font-weight:700">' + daysLuuk + 'd ' + slaStatus + '</td>' +
          '<td class="num" style="font-weight:700">' + totalAge + 'd</td>' +
          '<td><span class="badge covered">W14</span></td>' +
          '</tr>';
      }
      handoffHtml += '</tbody></table>';
      html += collapsibleSection('Role Handoff: Laine \u2192 Luuk', '(April 1, 2026)', 'var(--accent)', handoffHtml);

      /* TA Performance Analysis */
      var taEff = ANALYTICS.per_ta_efficiency || {};
      var taWhitelistPA = ['W1','W3','W2','W4'];
      // Pre-compute average manager delay count across all whitelisted TAs
      var totalMgrDelays = 0; var taMgrDelayCount = 0;
      for (var mdi = 0; mdi < taWhitelistPA.length; mdi++) {
        var mdEff = taEff[taWhitelistPA[mdi]];
        if (mdEff) { totalMgrDelays += mdEff.manager_delay_count; taMgrDelayCount++; }
      }
      var avgMgrDelay = taMgrDelayCount > 0 ? totalMgrDelays / taMgrDelayCount : 0;
      var analysisHtml = '';
      for (var ai = 0; ai < taWhitelistPA.length; ai++) {
        var taName = taWhitelistPA[ai];
        var td = taEff[taName];
        var rd = rec[taName] || {};
        var ts = taScreens[taName] || {ta_screens:0, roles_screened:0};
        if (!td && !rd.open_roles) continue;

        var strengths = [];
        var improvements = [];

        // Screens-to-hire ratio
        var screensToHire = (rd.filled_2026 > 0 && ts.ta_screens > 0) ? (ts.ta_screens / rd.filled_2026).toFixed(1) : null;
        if (screensToHire !== null) {
          if (parseFloat(screensToHire) <= 20) strengths.push('Screens-to-hire ratio: ' + screensToHire + ':1 (efficient)');
          else improvements.push('Screens-to-hire ratio: ' + screensToHire + ':1 — high screening effort per hire');
        } else if (rd.filled_2026 === 0 && ts.ta_screens > 0) {
          improvements.push('No hires closed yet despite ' + ts.ta_screens + ' screens');
        }

        // Analyze
        if (rd.filled_2026 > 5) strengths.push('Strong output: ' + rd.filled_2026 + ' hires in 2026');
        else if (rd.filled_2026 > 0) strengths.push(rd.filled_2026 + ' hires in 2026');
        else if (ts.ta_screens === 0) improvements.push('No hires closed in 2026 yet');

        if (rd.sla_rate >= 60) strengths.push('Good SLA adherence: ' + rd.sla_rate.toFixed(0) + '%');
        else if (rd.sla_rate > 0 && rd.sla_rate < 50) improvements.push('SLA rate below 50% (' + rd.sla_rate.toFixed(0) + '%) \u2014 focus on faster fills');

        // Specific at-risk roles
        var taAtRiskRoles = jobs.filter(function(j){ return j.recruiter === taName && j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; });
        if (taAtRiskRoles.length > 0) {
          var riskNames = taAtRiskRoles.map(function(j){
            var overSla = j.sla_remaining < 0 ? ' (' + Math.abs(j.sla_remaining) + 'd over SLA)' : '';
            return escHtml(j.name) + overSla;
          }).join(', ');
          improvements.push(taAtRiskRoles.length + ' roles at risk: ' + riskNames);
        } else if (rd.open_roles > 0) {
          strengths.push('No at-risk roles');
        }

        // Specific SLA-overdue roles
        var taOverdueRoles = jobs.filter(function(j){ return j.recruiter === taName && j.sla_status === 'overdue'; });
        if (taOverdueRoles.length > 0) {
          var overdueNames = taOverdueRoles.map(function(j){
            return escHtml(j.name) + ' (' + Math.abs(j.sla_remaining) + 'd over)';
          }).join(', ');
          improvements.push('SLA overdue: ' + overdueNames);
        }

        if (ts.ta_screens > 100 && ts.roles_screened > 5) strengths.push('High screening volume: ' + ts.ta_screens + ' across ' + ts.roles_screened + ' roles');

        // Manager delay flagging with peer comparison
        if (td && td.manager_delay_count > 10) {
          var mgrMsg = 'Manager delays on ' + td.manager_delay_count + ' candidates';
          if (td.manager_delay_count > avgMgrDelay * 1.5) mgrMsg += ' (disproportionately high vs. peer avg ' + Math.round(avgMgrDelay) + ')';
          mgrMsg += ' \u2014 escalate with HMs';
          improvements.push(mgrMsg);
        }

        // Monthly trend
        if (td && td.monthly && td.monthly.length >= 2) {
          var last = td.monthly[td.monthly.length - 1];
          var prev = td.monthly[td.monthly.length - 2];
          var calibCount = 0;
          for (var tdi = 0; tdi < td.monthly.length; tdi++) {
            if (td.monthly[tdi].flags.indexOf('calibration') !== -1) calibCount++;
          }
          if (calibCount >= 2) improvements.push('Recurring calibration issues (' + calibCount + ' months) \u2014 align with HMs on candidate profiles');
          if (last.total < prev.total) strengths.push('Rejection volume decreasing (efficiency improving)');
        }

        var borderCol = improvements.length > strengths.length ? 'var(--orange)' : 'var(--green)';
        analysisHtml += '<div style="margin-bottom:16px;padding:16px 20px;background:var(--white);border:1px solid var(--border);border-left:4px solid ' + borderCol + ';border-radius:10px">' +
          '<div style="font-weight:700;font-size:15px;margin-bottom:8px">' + escHtml(taName) +
          (screensToHire !== null ? '<span style="font-size:12px;font-weight:500;color:var(--text-dim);margin-left:12px">Screens/Hire: ' + screensToHire + ':1</span>' : '') +
          '</div>';
        if (strengths.length > 0) {
          analysisHtml += '<div style="margin-bottom:6px"><span style="color:var(--green);font-weight:700;font-size:12px">STRENGTHS</span>';
          for (var si = 0; si < strengths.length; si++) {
            analysisHtml += '<div style="font-size:13px;color:var(--text-dim);padding-left:12px">&#10003; ' + strengths[si] + '</div>';
          }
          analysisHtml += '</div>';
        }
        if (improvements.length > 0) {
          analysisHtml += '<div><span style="color:var(--orange);font-weight:700;font-size:12px">IMPROVE</span>';
          for (var ii = 0; ii < improvements.length; ii++) {
            analysisHtml += '<div style="font-size:13px;color:var(--text-dim);padding-left:12px">&#9888; ' + improvements[ii] + '</div>';
          }
          analysisHtml += '</div>';
        }
        analysisHtml += '</div>';
      }
      html += collapsibleSection('TA Performance Analysis', '', 'var(--accent)', analysisHtml);

      /* Per-TA Efficiency Tracker */
      var taEffR = ANALYTICS.per_ta_efficiency || {};
      var taEfficNames = ['W1','W3','W2','W4'];
      var hasEffData = taEfficNames.some(function(t){ return taEffR[t] && taEffR[t].monthly && taEffR[t].monthly.length > 0; });

      if (hasEffData) {
        var effTrackerHtml = '';
        for (var eti = 0; eti < taEfficNames.length; eti++) {
          var etName = taEfficNames[eti];
          var etd = taEffR[etName];
          if (!etd || !etd.monthly || etd.monthly.length === 0) continue;

          // Compute trend arrow and summary
          var trendArrow = ''; var trendSummary = '';
          if (etd.monthly.length >= 2) {
            var effLast = etd.monthly[etd.monthly.length - 1];
            var effPrev = etd.monthly[etd.monthly.length - 2];
            var effFirst = etd.monthly[0];
            var declining = effLast.total > effFirst.total;
            var improving = effLast.total < effFirst.total;
            trendArrow = improving ? '<span style="color:var(--green);font-weight:700;font-size:14px">&#9650;</span>' :
              declining ? '<span style="color:var(--red);font-weight:700;font-size:14px">&#9660;</span>' :
              '<span style="color:var(--text-dim);font-weight:700;font-size:14px">&#9644;</span>';
            var calibFlags = etd.monthly.filter(function(m){ return m.flags.indexOf('calibration') !== -1; }).length;
            var techDropFlags = etd.monthly.filter(function(m){ return m.flags.indexOf('tech_dropoff') !== -1; }).length;
            if (improving) {
              if (effLast.team_fit < effFirst.team_fit) trendSummary = 'Improving: fewer Team Fit rejections';
              else if (effLast.ta_screening < effFirst.ta_screening) trendSummary = 'Improving: better screening calibration';
              else trendSummary = 'Improving: total rejections trending down';
            } else if (declining) {
              if (calibFlags >= 2) trendSummary = 'Declining: recurring calibration issues (' + calibFlags + ' mo)';
              else if (effLast.team_fit > effFirst.team_fit) trendSummary = 'Declining: more Team Fit rejections';
              else if (techDropFlags > 0) trendSummary = 'Declining: tech drop-off increasing';
              else trendSummary = 'Declining: rejection volume rising';
            } else {
              trendSummary = 'Stable';
            }
          }

          var borderCol = etd.at_risk > 0 ? 'var(--red)' : etd.sla_rate >= 50 ? 'var(--green)' : 'var(--orange)';
          effTrackerHtml += '<div style="margin-top:20px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">' +
            '<div style="width:4px;height:18px;border-radius:2px;background:' + borderCol + '"></div>' +
            '<strong style="font-size:15px">' + escHtml(etName) + '</strong>' +
            (trendArrow ? '<span>' + trendArrow + '</span>' : '') +
            '<span style="font-size:12px;color:var(--text-dim)">Filled: ' + etd.filled_2026 + ' &middot; TTF: ' + (etd.avg_ttf > 0 ? etd.avg_ttf.toFixed(0) + 'd' : '\u2014') + ' &middot; SLA: ' + (etd.sla_rate > 0 ? etd.sla_rate.toFixed(0) + '%' : '\u2014') + '</span>' +
            (etd.at_risk > 0 ? '<span class="badge at_risk">' + etd.at_risk + ' at risk</span>' : '') +
            (etd.manager_delay_count > 0 ? '<span class="issue-badge stakeholder">mgr delays: ' + etd.manager_delay_count + '</span>' : '') +
            '</div>';
          if (trendSummary) {
            var trendColor = trendSummary.indexOf('Improving') === 0 ? 'var(--green)' : trendSummary.indexOf('Declining') === 0 ? 'var(--red)' : 'var(--text-dim)';
            effTrackerHtml += '<div style="font-size:12px;color:' + trendColor + ';font-weight:600;margin-bottom:8px;padding-left:16px">' + trendSummary + '</div>';
          }

          effTrackerHtml += '<table class="data-table"><thead><tr>' +
            '<th>Month</th><th class="num">TA Screen</th><th class="num">Team Fit</th>' +
            '<th class="num">Technical</th><th class="num">Cultural</th><th class="num">Offer</th>' +
            '<th class="num">Total Rej.</th><th>Flags</th>' +
            '</tr></thead><tbody>';

          var prevTotal = 0;
          for (var tmi = 0; tmi < etd.monthly.length; tmi++) {
            var tm = etd.monthly[tmi];
            var trendIcon = '';
            if (tmi > 0) {
              if (tm.total < prevTotal) trendIcon = ' <span style="color:var(--green)">&#9650;</span>';
              else if (tm.total > prevTotal) trendIcon = ' <span style="color:var(--red)">&#9660;</span>';
            }
            var flagHtml = '';
            for (var efi = 0; efi < tm.flags.length; efi++) {
              flagHtml += '<span class="issue-badge ' + tm.flags[efi] + '">' + tm.flags[efi] + '</span> ';
            }
            if (!flagHtml) flagHtml = '<span style="color:var(--green)">OK</span>';
            var rowCls = tm.flags.length > 0 ? ' class="row-flagged"' : '';
            effTrackerHtml += '<tr' + rowCls + '>' +
              '<td class="role-cell">' + tm.month + trendIcon + '</td>' +
              numCell(tm.ta_screening) +
              numCell(tm.team_fit, tm.team_fit > 10 ? 'highlight-cultural' : '') +
              numCell(tm.technical, tm.technical > 5 ? 'highlight-post' : '') +
              numCell(tm.cultural) +
              numCell(tm.offer) +
              '<td class="num" style="font-weight:700">' + tm.total + '</td>' +
              '<td>' + flagHtml + '</td>' +
              '</tr>';
            prevTotal = tm.total;
          }
          effTrackerHtml += '</tbody></table>';
        }
        html += collapsibleSection('TA Efficiency Tracker (2026)', '(monthly rejection breakdown per TA)', 'var(--accent)', effTrackerHtml);
      }

      /* TA Capacity Analysis */
      var capEff = ANALYTICS.per_ta_efficiency || {};
      var capScreens = ANALYTICS.recruiter_ta_screens || {};
      var capWhitelist = ['W1','W3','W2','W4'];
      var capHtml = '';
      for (var cwi = 0; cwi < capWhitelist.length; cwi++) {
        var capName = capWhitelist[cwi];
        var capRec = rec[capName] || {};
        var capTS = capScreens[capName] || {ta_screens:0, roles_screened:0};
        var capTD = capEff[capName] || {};
        var capJobs = jobs.filter(function(j){ return j.recruiter === capName; });
        var capOpenRoles = capJobs.length;
        var capPositions = capJobs.reduce(function(s,j){ return s + j.positions; }, 0);
        var capFilled = capRec.filled_2026 || 0;
        var capSlaRate = capRec.sla_rate || 0;
        var capAtRisk = capJobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; }).length;
        var capScreensToHire = (capFilled > 0 && capTS.ta_screens > 0) ? (capTS.ta_screens / capFilled) : null;

        // Determine capacity status and max recommendation
        var capStatus, capColor, capMaxRoles, capReasoning;
        if (capFilled === 0 && capOpenRoles > 0) {
          capStatus = 'Insufficient data';
          capColor = 'var(--text-dim)';
          capMaxRoles = '\u2014';
          capReasoning = 'Insufficient data \u2014 new TA or no fills yet. Cannot estimate max capacity without hire data.';
        } else if (capSlaRate >= 60) {
          capMaxRoles = capOpenRoles + 3;
          capStatus = 'Under capacity';
          capColor = 'var(--green)';
          capReasoning = 'Handling ' + capOpenRoles + ' roles with ' + capSlaRate.toFixed(0) + '% SLA.' +
            (capScreensToHire !== null ? ' At current efficiency (' + capScreensToHire.toFixed(1) + ' screens/hire), max ~' + capMaxRoles + ' roles recommended.' : ' Max ~' + capMaxRoles + ' roles recommended.');
        } else if (capSlaRate >= 40) {
          capMaxRoles = capOpenRoles;
          capStatus = 'At capacity';
          capColor = 'var(--orange)';
          capReasoning = 'Handling ' + capOpenRoles + ' roles with ' + capSlaRate.toFixed(0) + '% SLA.' +
            (capScreensToHire !== null ? ' At current efficiency (' + capScreensToHire.toFixed(1) + ' screens/hire), max ~' + capMaxRoles + ' roles recommended.' : ' Max ~' + capMaxRoles + ' roles recommended.');
        } else {
          // SLA < 40% or at_risk > 2
          capMaxRoles = Math.max(3, capOpenRoles - 2);
          capStatus = 'Over capacity';
          capColor = 'var(--red)';
          var overReasons = [];
          if (capSlaRate > 0 && capSlaRate < 40) overReasons.push(capSlaRate.toFixed(0) + '% SLA');
          if (capAtRisk > 2) overReasons.push(capAtRisk + ' at-risk roles');
          if (capOpenRoles > 12) overReasons.push(capOpenRoles + ' open roles (>12)');
          capReasoning = 'Handling ' + capOpenRoles + ' roles with ' + (overReasons.join(', ') || 'low performance') + '.' +
            (capScreensToHire !== null ? ' At current efficiency (' + capScreensToHire.toFixed(1) + ' screens/hire), max ~' + capMaxRoles + ' roles recommended.' : ' Max ~' + capMaxRoles + ' roles recommended.');
        }
        // Override: if >12 open roles and SLA < 50% => overloaded
        if (capOpenRoles > 12 && capSlaRate > 0 && capSlaRate < 50 && capStatus !== 'Insufficient data') {
          capMaxRoles = Math.max(3, capOpenRoles - 2);
          capStatus = 'Over capacity';
          capColor = 'var(--red)';
          capReasoning = 'Handling ' + capOpenRoles + ' roles (>12) with ' + capSlaRate.toFixed(0) + '% SLA (<50%). Likely overloaded.' +
            (capScreensToHire !== null ? ' At current efficiency (' + capScreensToHire.toFixed(1) + ' screens/hire), max ~' + capMaxRoles + ' roles recommended.' : ' Max ~' + capMaxRoles + ' roles recommended.');
        }
        // Override: if >8 roles and at_risk > 2 => stretched
        if (capOpenRoles > 8 && capAtRisk > 2 && capStatus !== 'Over capacity' && capStatus !== 'Insufficient data') {
          capMaxRoles = Math.max(3, capOpenRoles - 2);
          capStatus = 'Over capacity';
          capColor = 'var(--red)';
          capReasoning = 'Handling ' + capOpenRoles + ' roles (>8) with ' + capAtRisk + ' at-risk (>2). Capacity stretched.' +
            (capScreensToHire !== null ? ' At current efficiency (' + capScreensToHire.toFixed(1) + ' screens/hire), max ~' + capMaxRoles + ' roles recommended.' : ' Max ~' + capMaxRoles + ' roles recommended.');
        }

        capHtml += '<div style="margin-bottom:16px;padding:16px 20px;background:var(--white);border:1px solid var(--border);border-left:4px solid ' + capColor + ';border-radius:10px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
          '<strong style="font-size:15px">' + escHtml(capName) + '</strong>' +
          '<span class="badge" style="background:' + (capColor === 'var(--green)' ? 'var(--green-bg)' : capColor === 'var(--orange)' ? 'var(--orange-bg)' : capColor === 'var(--red)' ? 'var(--red-bg)' : '#f1f5f9') + ';color:' + capColor + '">' + capStatus + '</span>' +
          '</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 16px;font-size:13px;margin-bottom:8px">' +
          '<div><span style="color:var(--text-dim)">Current Load</span><br><strong>' + capOpenRoles + ' open roles, ' + capPositions + ' positions</strong></div>' +
          '<div><span style="color:var(--text-dim)">Recommended Max</span><br><strong style="color:' + capColor + '">' + capMaxRoles + ' roles</strong></div>' +
          '<div><span style="color:var(--text-dim)">Filled 2026</span><br><strong style="color:var(--green)">' + capFilled + '</strong>' +
          (capScreensToHire !== null ? ' <span style="font-size:11px;color:var(--text-dim)">(' + capScreensToHire.toFixed(1) + ' screens/hire)</span>' : '') + '</div>' +
          '</div>' +
          '<div style="font-size:12px;color:var(--text-dim);background:#f8f9fb;padding:8px 12px;border-radius:6px">' + capReasoning + '</div>' +
          '</div>';
      }
      html += collapsibleSection('TA Capacity Analysis', '', 'var(--accent)', capHtml);

      document.getElementById('tab-recruiter').innerHTML = html;
    }

    /* ================================================================
       TAB: DEPARTMENT
       ================================================================ */
    function renderDepartment() {
      var dept = ANALYTICS.per_department;
      var names = Object.keys(dept).filter(function(n){ return n !== 'Unknown'; }).sort(function(a,b){
        return dept[b].open_roles - dept[a].open_roles || a.localeCompare(b);
      });
      var mgrDelaysDept = ANALYTICS.manager_delays || {};

      /* Department Health Scorecard */
      var scorecardHtml = '<div class="kpi-row" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));margin-bottom:28px">';
      for (var sci = 0; sci < names.length; sci++) {
        var scName = names[sci];
        var scD = dept[scName];
        if (scD.open_roles === 0) continue;
        var scP = scD.per_stage;
        var postGate = scP.technical + scP.cultural + scP.offer;
        // Scoring: age, at-risk %, conversion, manager delays
        var agePenalty = scD.avg_age > 120 ? 2 : scD.avg_age > 60 ? 1 : 0;
        // at risk: roles with no one past team fit
        var deptJobs = jobs.filter(function(j){ return j.dept === scName; });
        var deptAtRisk = deptJobs.filter(function(j){ return j.total > 0 && j.pre_gate < 3 && j.technical === 0 && j.cultural === 0 && j.offer === 0; });
        var riskPct = deptJobs.length > 0 ? deptAtRisk.length / deptJobs.length : 0;
        var riskPenalty = riskPct > 0.5 ? 2 : riskPct > 0.2 ? 1 : 0;
        var convTotal = scP.early > 0 ? (scP.technical + scP.cultural + scP.offer) / scP.early : 0;
        var convPenalty = convTotal < 0.02 && scP.early > 10 ? 2 : convTotal < 0.05 && scP.early > 10 ? 1 : 0;
        // manager delay penalty for this dept
        var deptDelayCount = 0;
        for (var mdk in mgrDelaysDept) {
          if (mgrDelaysDept[mdk].dept && mgrDelaysDept[mdk].dept.trim() === scName) deptDelayCount += mgrDelaysDept[mdk].hireflix_severe + mgrDelaysDept[mdk].tech_severe;
        }
        var delayPenalty = deptDelayCount > 3 ? 2 : deptDelayCount > 0 ? 1 : 0;
        var totalScore = agePenalty + riskPenalty + convPenalty + delayPenalty;
        var healthLabel, healthCls;
        if (totalScore >= 4) { healthLabel = 'Critical'; healthCls = 'unhealthy'; }
        else if (totalScore >= 2) { healthLabel = 'Warning'; healthCls = 'at_risk'; }
        else { healthLabel = 'Healthy'; healthCls = 'healthy'; }
        // Primary bottleneck
        var bottleneck = '\u2014';
        if (agePenalty >= riskPenalty && agePenalty >= convPenalty && agePenalty >= delayPenalty && agePenalty > 0) bottleneck = 'High pipeline age (' + scD.avg_age.toFixed(0) + 'd)';
        else if (riskPenalty >= convPenalty && riskPenalty >= delayPenalty && riskPenalty > 0) bottleneck = deptAtRisk.length + ' of ' + deptJobs.length + ' roles at risk';
        else if (delayPenalty >= convPenalty && delayPenalty > 0) bottleneck = deptDelayCount + ' severe manager delays';
        else if (convPenalty > 0) bottleneck = 'Low conversion to technical+';
        scorecardHtml += '<div class="kpi-card" style="padding:14px 18px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
          '<span style="font-weight:700;font-size:14px">' + escHtml(scName) + '</span>' +
          '<span class="badge ' + healthCls + '">' + healthLabel + '</span></div>' +
          '<div style="font-size:12px;color:var(--text-dim)">' + scD.open_roles + ' roles &middot; ' + scD.total_candidates + ' candidates &middot; ' + (scD.filled_2026 || 0) + ' filled</div>' +
          (bottleneck !== '\u2014' ? '<div style="font-size:11px;margin-top:4px;color:' + (totalScore >= 4 ? 'var(--red)' : 'var(--orange)') + ';font-weight:600">Bottleneck: ' + bottleneck + '</div>' : '') +
          '</div>';
      }
      scorecardHtml += '</div>';
      var html = scorecardHtml;

      var convHtml = '<table class="data-table"><thead><tr>' +
        '<th>Department</th>' +
        '<th class="num">Early &rarr; Screened</th>' +
        '<th class="num">Screened &rarr; Team Fit</th>' +
        '<th class="num">Team Fit &rarr; Technical</th>' +
        '<th class="num">Technical &rarr; Cultural</th>' +
        '<th class="num">Cultural &rarr; Offer</th>' +
        '<th>Bottleneck Stage</th>' +
        '</tr></thead><tbody>';

      for (var ci = 0; ci < names.length; ci++) {
        var nm = names[ci];
        var dd = dept[nm];
        var p = dd.per_stage;
        function convRate(from, to) {
          if (from === 0) return '\u2014';
          var pct = Math.round((to / from) * 100);
          var cls = pct < 10 && from > 5 ? 'style="color:var(--red);font-weight:700"' : '';
          return '<span ' + cls + '>' + pct + '%</span>';
        }
        // Determine bottleneck stage (worst drop-off)
        var stages = [
          {name:'Early\u2192Screened', from:p.early, to:p.screened},
          {name:'Screened\u2192Team Fit', from:p.screened, to:p.team_fit},
          {name:'Team Fit\u2192Technical', from:p.team_fit, to:p.technical},
          {name:'Technical\u2192Cultural', from:p.technical, to:p.cultural},
          {name:'Cultural\u2192Offer', from:p.cultural, to:p.offer}
        ];
        var worstDrop = null; var worstPct = 999;
        for (var bsi = 0; bsi < stages.length; bsi++) {
          var st = stages[bsi];
          if (st.from > 2) {
            var bPct = Math.round((st.to / st.from) * 100);
            if (bPct < worstPct) { worstPct = bPct; worstDrop = st.name + ' (' + bPct + '%)'; }
          }
        }
        convHtml += '<tr>' +
          '<td class="role-cell">' + escHtml(nm) + '</td>' +
          '<td class="num">' + convRate(p.early, p.screened) + '</td>' +
          '<td class="num">' + convRate(p.screened, p.team_fit) + '</td>' +
          '<td class="num">' + convRate(p.team_fit, p.technical) + '</td>' +
          '<td class="num">' + convRate(p.technical, p.cultural) + '</td>' +
          '<td class="num">' + convRate(p.cultural, p.offer) + '</td>' +
          '<td style="font-size:12px;color:var(--red);font-weight:600">' + (worstDrop || '\u2014') + '</td>' +
          '</tr>';
      }
      convHtml += '</tbody></table>';
      html += collapsibleSection('Stage-to-Stage Conversion Ratios', '', 'var(--accent)', convHtml);

      var deptOverviewHtml = '<table class="data-table"><thead><tr>' +
        '<th>Department</th><th class="num">Open Roles</th><th class="num">Positions</th>' +
        '<th class="num">Candidates</th>' +
        '<th class="num">Early</th><th class="num">Screened</th>' +
        '<th class="num">Team Fit</th><th class="num">Technical</th>' +
        '<th class="num">Cultural</th><th class="num">Offer</th>' +
        '<th class="num">Filled 2026</th><th class="num">Avg TTF</th>' +
        '</tr></thead><tbody>';

      for (var di = 0; di < names.length; di++) {
        var dname = names[di];
        var d = dept[dname];
        var ps = d.per_stage;
        var postGate = ps.technical + ps.cultural + ps.offer;
        var flagged = (postGate === 0 && d.open_roles > 0) || (d.avg_age > 120 && d.open_roles > 0);
        var rowCls = flagged ? ' class="row-flagged"' : '';
        deptOverviewHtml += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(dname) + '</td>' +
          numCell(d.open_roles) +
          numCell(d.positions) +
          numCell(d.total_candidates) +
          numCell(ps.early) +
          numCell(ps.screened) +
          numCell(ps.team_fit) +
          numCell(ps.technical, 'highlight-post') +
          numCell(ps.cultural, 'highlight-cultural') +
          numCell(ps.offer, 'highlight-offer') +
          numCell(d.filled_2026, d.filled_2026 > 0 ? 'highlight-offer' : '') +
          '<td class="num">' + (d.avg_ttf > 0 ? d.avg_ttf.toFixed(0) + 'd' : '\u2014') + '</td>' +
          '</tr>';
      }
      deptOverviewHtml += '</tbody></table>';
      html += collapsibleSection('Department Pipeline Overview', '(' + names.length + ' departments)', 'var(--accent)', deptOverviewHtml);

      /* Department Passthrough Rates */
      // Pre-compute worst (lowest %) department per stage (only where from > 2)
      var ptStageNames = ['earlyToScreened','screenedToTF','tfToTech','techToCultural','tfToCultural','culturalToOffer'];
      var worstPerStage = {};
      for (var wsi = 0; wsi < ptStageNames.length; wsi++) worstPerStage[ptStageNames[wsi]] = {dept:null, pct:999};
      for (var wpi = 0; wpi < names.length; wpi++) {
        var wpN = names[wpi]; var wpP = dept[wpN].per_stage;
        var ptChecks = [
          {key:'earlyToScreened', from:wpP.early, to:wpP.screened},
          {key:'screenedToTF', from:wpP.screened, to:wpP.team_fit},
          {key:'tfToTech', from:wpP.team_fit, to:wpP.technical},
          {key:'techToCultural', from:wpP.technical, to:wpP.cultural},
          {key:'tfToCultural', from:wpP.team_fit, to:wpP.cultural},
          {key:'culturalToOffer', from:wpP.cultural, to:wpP.offer}
        ];
        for (var wci = 0; wci < ptChecks.length; wci++) {
          var wc = ptChecks[wci];
          if (wc.from > 2) {
            var wcPct = Math.round((wc.to / wc.from) * 100);
            if (wcPct < worstPerStage[wc.key].pct) { worstPerStage[wc.key] = {dept:wpN, pct:wcPct}; }
          }
        }
      }

      var deptPtHtml = '<table class="data-table"><thead><tr>' +
        '<th>Department</th>' +
        '<th class="num">Early &rarr; Screened</th>' +
        '<th class="num">Screened &rarr; Team Fit</th>' +
        '<th class="num">Team Fit &rarr; Technical</th>' +
        '<th class="num">Technical &rarr; Cultural</th>' +
        '<th class="num">Team Fit &rarr; Cultural</th>' +
        '<th class="num">Cultural &rarr; Offer</th>' +
        '</tr></thead><tbody>';

      var histPT = ANALYTICS.dept_historical_passthrough || {};
      for (var pi = 0; pi < names.length; pi++) {
        var pn = names[pi];
        var hp = histPT[pn] || {ta_screening:0, team_fit:0, technical:0, cultural:0};
        var pp = dept[pn].per_stage;
        function ptRateH(from, to) {
          if (from === 0) return '\u2014';
          var pct = Math.round((to / from) * 100);
          if (pct > 100) pct = 100;
          var bad = pct < 15 && from > 5;
          return '<span' + (bad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + pct + '%</span>';
        }
        var tfToCult = (hp.team_fit > 0) ? Math.min(100, Math.round((hp.cultural / hp.team_fit) * 100)) : 0;
        var techToCult = (hp.technical > 0) ? Math.min(100, Math.round((hp.cultural / hp.technical) * 100)) : 0;
        var techBad = hp.technical > 2 && techToCult < 20;
        var rowCls = techBad ? ' class="row-flagged"' : '';
        deptPtHtml += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(pn) + '</td>' +
          '<td class="num">' + ptRateH(pp.early, hp.ta_screening) + '</td>' +
          '<td class="num">' + ptRateH(hp.ta_screening, hp.team_fit) + '</td>' +
          '<td class="num">' + ptRateH(hp.team_fit, hp.technical) + '</td>' +
          '<td class="num"><span' + (techBad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + (hp.technical > 0 ? techToCult + '%' : '\u2014') + '</span></td>' +
          '<td class="num"><span' + (hp.team_fit > 3 && tfToCult < 15 ? ' style="color:var(--orange);font-weight:700"' : '') + '>' + (hp.team_fit > 0 ? tfToCult + '%' : '\u2014') + '</span></td>' +
          '<td class="num">' + ptRateH(hp.cultural, pp.offer) + '</td>' +
          '</tr>';
      }
      deptPtHtml += '</tbody></table>';
      html += collapsibleSection('Department Passthrough Rates', '(% of candidates advancing to next stage)', 'var(--red)', deptPtHtml);

      /* Per-Manager Hireflix Review Time */
      var mgrHF = ANALYTICS.manager_hireflix_review || [];
      if (mgrHF.length > 0) {
        var mgrTableHtml = '<table class="data-table"><thead><tr>' +
          '<th>Hiring Manager</th><th class="num">Candidates</th><th class="num">Avg Review (days)</th>' +
          '<th class="num">Delays (5d+)</th><th class="num">Severe (10d+)</th><th>Roles</th>' +
          '</tr></thead><tbody>';
        for (var mi = 0; mi < mgrHF.length; mi++) {
          var mg = mgrHF[mi];
          var flagged = mg.delays > 0;
          var rowCls = flagged ? ' class="row-flagged"' : '';
          var rolesStr = mg.roles.map(function(r) {
            var bad = r.max_days > 10;
            return '<span style="font-size:11px' + (bad ? ';color:var(--red);font-weight:700' : '') + '">' + escHtml(r.name) + ' (' + r.avg_days + 'd, max ' + r.max_days + 'd)</span>';
          }).join(', ');
          mgrTableHtml += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(mg.manager) + '</td>' +
            '<td class="num">' + mg.total_candidates + '</td>' +
            '<td class="num"' + (mg.avg_days > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + mg.avg_days + 'd</td>' +
            '<td class="num"' + (mg.delays > 0 ? ' style="color:var(--orange);font-weight:700"' : '') + '>' + mg.delays + '</td>' +
            '<td class="num"' + (mg.severe > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + mg.severe + '</td>' +
            '<td style="font-size:12px">' + rolesStr + '</td>' +
            '</tr>';
        }
        mgrTableHtml += '</tbody></table>';
        html += collapsibleSection('Manager Hireflix Review Time', '(' + mgrHF.length + ' managers)', 'var(--orange)', mgrTableHtml);
      }

      /* Manager Delay → SLA Correlation */
      var mgrCorr = ANALYTICS.manager_sla_correlation || [];
      var corrWithImpact = mgrCorr.filter(function(c){ return c.delay_candidates > 0 || c.roles_overdue > 0; });
      if (corrWithImpact.length > 0) {
        var corrHtml = '<div class="funnel-banner" style="margin-bottom:16px">' +
          '<strong>Correlation:</strong> Managers with slow review times (5d+) tend to cause pipeline delays. ' +
          'Roles with manager delays are more likely to breach SLA targets.</div>' +
          '<table class="data-table"><thead><tr>' +
          '<th>Manager</th><th class="num">Roles</th><th class="num">Avg Review</th>' +
          '<th class="num">Delayed Cands</th><th class="num">Severe</th>' +
          '<th>Impact</th><th>Affected Roles</th>' +
          '</tr></thead><tbody>';
        for (var ci = 0; ci < corrWithImpact.length; ci++) {
          var cr = corrWithImpact[ci];
          var impactBadge = cr.correlation === 'strong' ? '<span class="issue-badge risk">Strong</span>' :
            cr.correlation === 'moderate' ? '<span class="issue-badge calibration">Moderate</span>' : '';
          var affectedStr = cr.roles.filter(function(r){return r.avg_wait > 5}).map(function(r){
            return '<span style="font-size:11px">' + escHtml(r.role) + ' (' + r.avg_wait + 'd)</span>';
          }).join(', ');
          var rowCls = cr.correlation === 'strong' ? ' class="row-flagged"' : '';
          corrHtml += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(cr.manager) + '</td>' +
            '<td class="num">' + cr.roles_count + '</td>' +
            '<td class="num"' + (cr.avg_review_days > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + cr.avg_review_days + 'd</td>' +
            '<td class="num"' + (cr.delay_candidates > 5 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + cr.delay_candidates + '</td>' +
            '<td class="num">' + cr.severe_delays + '</td>' +
            '<td>' + impactBadge + '</td>' +
            '<td style="font-size:12px">' + (affectedStr || '\u2014') + '</td>' +
            '</tr>';
        }
        corrHtml += '</tbody></table>';
        html += collapsibleSection('Manager Delay → SLA Impact', '(' + corrWithImpact.length + ' managers with delays)', 'var(--red)', corrHtml);
      }

      document.getElementById('tab-department').innerHTML = html;
    }

    /* ================================================================
       TAB: HIRING PERFORMANCE
       ================================================================ */
    function renderPerformance() {
      var pt = ANALYTICS.passthrough_rates;

      /* Top 5 Risks: roles most likely to fail SLA */
      var riskCandidates = [];
      var perfMgrDelays = ANALYTICS.manager_delays || {};
      var perfRoleHealth = ANALYTICS.per_role_health || [];
      for (var rci = 0; rci < jobs.length; rci++) {
        var rj = jobs[rci];
        var riskScore = 0;
        var reasons = [];
        // Thin pipeline
        if (rj.total > 0 && rj.technical === 0 && rj.cultural === 0 && rj.offer === 0) {
          riskScore += 3;
          if (rj.pre_gate < 3) reasons.push('Thin pipeline: ' + rj.pre_gate + ' at Team Fit, none past');
          else reasons.push('No candidates past Team Fit');
        }
        // SLA overdue
        if (rj.sla_status === 'overdue') { riskScore += 4; reasons.push(Math.abs(rj.sla_remaining) + 'd over SLA'); }
        else if (rj.sla_status === 'warning') { riskScore += 2; reasons.push('Only ' + rj.sla_remaining + 'd until SLA'); }
        // Manager delays
        var rjDelay = perfMgrDelays[rj.name];
        if (rjDelay && (rjDelay.hireflix_severe > 0 || rjDelay.tech_severe > 0)) {
          riskScore += 2;
          if (rjDelay.hireflix_severe > 0) reasons.push('HM Hireflix delay (max ' + rjDelay.max_hireflix + 'd)');
          if (rjDelay.tech_severe > 0) reasons.push('Tech scheduling delay (max ' + rjDelay.max_tech + 'd)');
        }
        // Health issues from analytics
        var roleH = perfRoleHealth.filter(function(rh){ return rh.name === rj.name; })[0];
        if (roleH && !roleH.healthy) {
          riskScore += 1;
          if (roleH.issue === 'calibration') reasons.push('Calibration issue');
          else if (roleH.issue === 'stakeholder') reasons.push('HM bottleneck');
        }
        // High age
        if (rj.age_days > 90) { riskScore += 1; reasons.push('Pipeline age: ' + rj.age_days + 'd'); }
        if (riskScore > 0) riskCandidates.push({name:rj.name, dept:rj.dept, recruiter:rj.recruiter||'\u2014', score:riskScore, reasons:reasons});
      }
      riskCandidates.sort(function(a,b){ return b.score - a.score; });
      var top5 = riskCandidates.slice(0, 5);

      var riskHtml = '<div class="kpi-row" style="grid-template-columns:1fr;margin-bottom:24px">';
      for (var t5i = 0; t5i < top5.length; t5i++) {
        var t5 = top5[t5i];
        var riskColor = t5.score >= 5 ? 'var(--red)' : t5.score >= 3 ? 'var(--orange)' : 'var(--text-dim)';
        riskHtml += '<div class="kpi-card" style="border-left:4px solid ' + riskColor + ';padding:12px 18px;display:flex;align-items:center;gap:16px">' +
          '<div style="min-width:24px;text-align:center;font-size:18px;font-weight:700;color:' + riskColor + '">' + (t5i + 1) + '</div>' +
          '<div style="flex:1">' +
          '<div style="font-weight:700;font-size:14px">' + escHtml(t5.name) + ' <span style="font-size:12px;color:var(--text-dim);font-weight:500">' + escHtml(t5.dept) + ' \u00b7 ' + escHtml(t5.recruiter) + '</span></div>' +
          '<div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + t5.reasons.join(' \u00b7 ') + '</div>' +
          '</div></div>';
      }
      riskHtml += '</div>';

      var html = collapsibleSection('Top 5 Risks', '(roles most likely to fail SLA)', 'var(--red)', riskHtml);

      var ptCardsHtml = '<div class="passthrough-row">' +
        '<div class="passthrough-card"><div class="passthrough-label">Screening &rarr; Team Fit</div><div class="passthrough-value">' + pt.screening_to_teamfit + '%</div></div>' +
        '<div class="passthrough-card"><div class="passthrough-label">Team Fit &rarr; Technical</div><div class="passthrough-value">' + pt.teamfit_to_technical + '%</div></div>' +
        '<div class="passthrough-card" style="border-left-color:var(--red)"><div class="passthrough-label">Technical &rarr; Cultural</div><div class="passthrough-value" style="color:var(--red)">' + pt.technical_to_cultural + '%</div></div>' +
        '<div class="passthrough-card" style="border-left-color:var(--orange)"><div class="passthrough-label">Team Fit &rarr; Cultural</div><div class="passthrough-value" style="color:var(--orange)">' + (pt.teamfit_to_cultural || 0) + '%</div><div style="font-size:10px;color:var(--text-dim)">compound</div></div>' +
        '<div class="passthrough-card"><div class="passthrough-label">Cultural &rarr; Offer</div><div class="passthrough-value">' + pt.cultural_to_offer + '%</div></div>' +
        '</div>';
      html += collapsibleSection('Passthrough Rates', '', 'var(--accent)', ptCardsHtml);

      var roles = ANALYTICS.per_role_health.slice();
      roles.sort(function(a,b) { if (a.healthy === b.healthy) return 0; return a.healthy ? 1 : -1; });
      var unhealthyCount = roles.filter(function(r){ return !r.healthy; }).length;
      var healthyCount = roles.length - unhealthyCount;

      var roleHealthHtml = '<table class="data-table"><thead><tr>' +
        '<th>Role</th><th>Department</th><th>Recruiter</th><th>Health</th><th>Issue Type</th><th>Reason</th>' +
        '</tr></thead><tbody>';

      for (var ri = 0; ri < roles.length; ri++) {
        var r = roles[ri];
        var healthBadge = r.healthy
          ? '<span class="badge healthy">Healthy</span>'
          : '<span class="badge unhealthy">Unhealthy</span>';
        var issueBadge = '';
        if (r.issue) issueBadge = '<span class="issue-badge ' + r.issue + '">' + r.issue + '</span>';
        var rowCls = r.healthy ? '' : ' class="row-flagged"';
        roleHealthHtml += '<tr' + rowCls + '>' +
          '<td class="role-cell">' + escHtml(r.name) + '</td>' +
          '<td class="dept-cell">' + escHtml(r.dept) + '</td>' +
          '<td class="recruiter-cell">' + escHtml(r.recruiter) + '</td>' +
          '<td>' + healthBadge + '</td>' +
          '<td>' + issueBadge + '</td>' +
          '<td style="font-size:13px;color:var(--text-dim);max-width:340px">' + (r.reason ? escHtml(r.reason) : '\u2014') + '</td>' +
          '</tr>';
      }
      roleHealthHtml += '</tbody></table>';
      html += collapsibleSection('Role Health Diagnosis', '(' + unhealthyCount + ' issues, ' + healthyCount + ' healthy)', 'var(--red)', roleHealthHtml);

      /* Stage Timing per Role */
      var roleTiming = ANALYTICS.role_timing || [];
      if (roleTiming.length > 0) {
        var stageTimingHtml = '<table class="data-table"><thead><tr>' +
          '<th>Role</th><th>Recruiter</th>' +
          '<th class="num">Screening</th>' +
          '<th class="num">Hireflix</th>' +
          '<th class="num">Team Fit</th>' +
          '<th class="num">Technical</th>' +
          '<th class="num">Overdue App</th>' +
          '<th class="num">Overdue Screen</th>' +
          '<th>Bottleneck</th>' +
          '</tr></thead><tbody>';

        for (var ti = 0; ti < roleTiming.length; ti++) {
          var rt = roleTiming[ti];
          var hasOverdue = rt.overdue_application > 0 || rt.overdue_screening > 0;
          var rowCls = hasOverdue ? ' class="row-flagged"' : '';
          function daysCell(avg, count, threshold) {
            if (count === 0) return '<td class="num zero">\u2014</td>';
            var bad = avg > threshold;
            return '<td class="num"' + (bad ? ' style="color:var(--red);font-weight:700"' : '') + '>' + avg + 'd <span style="font-size:10px;color:var(--text-dim)">(' + count + ')</span></td>';
          }
          // Determine bottleneck
          var bneck = '';
          if (rt.avg_hireflix > 10 && rt.count_hireflix > 0) bneck = 'HM slow on Hireflix (' + rt.avg_hireflix + 'd)';
          else if (rt.avg_screening > 15 && rt.count_screening > 2) bneck = 'Screening backlog (' + rt.avg_screening + 'd)';
          else if (rt.avg_technical > 12 && rt.count_technical > 0) bneck = 'Technical delay (' + rt.avg_technical + 'd)';
          else if (rt.avg_team_fit > 8 && rt.count_team_fit > 0) bneck = 'Team Fit slow (' + rt.avg_team_fit + 'd)';
          else if (rt.overdue_screening > 5) bneck = rt.overdue_screening + ' stuck in screening';
          else if (rt.overdue_application > 20) bneck = rt.overdue_application + ' unreviewed apps';
          // Check from jobs data if no candidates past screening
          var bnJob = jobs.filter(function(j){ return j.name === rt.name; })[0];
          if (!bneck && bnJob && bnJob.technical === 0 && bnJob.cultural === 0 && bnJob.offer === 0 && bnJob.pre_gate > 0) {
            bneck = 'No candidates past Team Fit';
          }
          stageTimingHtml += '<tr' + rowCls + '>' +
            '<td class="role-cell">' + escHtml(rt.name) + '</td>' +
            '<td class="recruiter-cell">' + escHtml(rt.recruiter) + '</td>' +
            daysCell(rt.avg_screening, rt.count_screening, 7) +
            daysCell(rt.avg_hireflix, rt.count_hireflix, 5) +
            daysCell(rt.avg_team_fit, rt.count_team_fit, 5) +
            daysCell(rt.avg_technical, rt.count_technical, 10) +
            '<td class="num"' + (rt.overdue_application > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rt.overdue_application + '</td>' +
            '<td class="num"' + (rt.overdue_screening > 0 ? ' style="color:var(--red);font-weight:700"' : '') + '>' + rt.overdue_screening + '</td>' +
            '<td style="font-size:12px;color:' + (bneck ? 'var(--red)' : 'var(--green)') + ';font-weight:600">' + (bneck || 'OK') + '</td>' +
            '</tr>';
        }
        stageTimingHtml += '</tbody></table>';
        html += collapsibleSection('Average Days in Stage per Role', '(flag: >7d in application/screening)', 'var(--orange)', stageTimingHtml);
      }

      /* Monthly Tracker */
      var monthlyFills = ANALYTICS.monthly_fills || {};
      var monthlyFillsByTA = ANALYTICS.monthly_fills_by_ta || {};
      var monthlyScreensByTA = ANALYTICS.monthly_screens_by_ta || {};
      var allMonths = ANALYTICS.all_months || [];

      var months2026 = allMonths.filter(function(m){return m.startsWith('2026')});
      if (months2026.length > 0) {
        var TA_WHITELIST = ['W1','W3','W2','W4'];
        var activeTAs = TA_WHITELIST.filter(function(ta){ return monthlyFillsByTA[ta] || monthlyScreensByTA[ta]; });

        var monthlyTrackerHtml = '<table class="data-table"><thead><tr>' +
          '<th>Month</th><th class="num">Fills</th>';
        for (var tai = 0; tai < activeTAs.length; tai++) {
          var firstName = activeTAs[tai].split(' ')[0];
          monthlyTrackerHtml += '<th class="num">' + escHtml(firstName) + ' Fills</th><th class="num">' + escHtml(firstName) + ' Screens</th>';
        }
        monthlyTrackerHtml += '</tr></thead><tbody>';

        var totalFillsAll = 0;
        for (var mi = 0; mi < months2026.length; mi++) {
          var m = months2026[mi];
          var fills = monthlyFills[m] || 0;
          totalFillsAll += fills;
          monthlyTrackerHtml += '<tr>' +
            '<td class="role-cell">' + m + '</td>' +
            '<td class="num" style="font-weight:700">' + fills + '</td>';
          for (var tbi = 0; tbi < activeTAs.length; tbi++) {
            var ta = activeTAs[tbi];
            var taFills = (monthlyFillsByTA[ta] || {})[m] || 0;
            var taScreens = (monthlyScreensByTA[ta] || {})[m] || 0;
            monthlyTrackerHtml += numCell(taFills, taFills > 0 ? 'highlight-offer' : '') +
              numCell(taScreens, taScreens > 20 ? 'highlight-post' : '');
          }
          monthlyTrackerHtml += '</tr>';
        }

        monthlyTrackerHtml += '<tr style="font-weight:700;border-top:2px solid var(--border)">' +
          '<td class="role-cell">Total</td>' +

    /* ================================================================

    function renderEffectiveness() {
      /* Key Insights banner - auto-generated from data */
      var effInsights = [];

      var effPt = ANALYTICS.passthrough_rates;
      effInsights.push('Technical interview is the critical bottleneck: only ' + effPt.technical_to_cultural + '% pass through (compound Team Fit\u2192Cultural: ' + (effPt.teamfit_to_cultural || 0) + '%)');
      // Insight 2: Highest rejection stage
      var effRej = ANALYTICS.rejection_by_stage_excl_intern || {};
      var topRejStage = ''; var topRejCount = 0;
      for (var ers in effRej) {
        if (ers !== 'Application Review' && ers !== 'Unknown' && effRej[ers] > topRejCount) { topRejCount = effRej[ers]; topRejStage = ers; }
      }
      if (topRejStage) effInsights.push('Highest post-app rejection stage: ' + topRejStage + ' with ' + topRejCount.toLocaleString() + ' rejections (excl. intern)');
      // Insight 3: Manager delays impact
      var effMgrHF = ANALYTICS.manager_hireflix_review || [];
      var totalMgrDelays2 = effMgrHF.reduce(function(s,m){ return s + m.delays; }, 0);
      var totalMgrSevere = effMgrHF.reduce(function(s,m){ return s + m.severe; }, 0);
      if (totalMgrDelays2 > 0) effInsights.push(totalMgrDelays2 + ' manager Hireflix delays (' + totalMgrSevere + ' severe 10d+) are slowing pipeline across ' + effMgrHF.filter(function(m){return m.delays > 0}).length + ' managers');
      // Insight 4: TA with best/worst efficiency
      var effFunnel = ANALYTICS.funnel_efficiency || [];
      var calibRoles = effFunnel.filter(function(f){ return f.tf_to_tech_pct < 30 && f.team_fit_entered > 3; });
      if (calibRoles.length > 0) effInsights.push(calibRoles.length + ' roles show HM calibration issues (TF\u2192Tech <30%): ' + calibRoles.slice(0,3).map(function(r){return r.name}).join(', '));
      // Insight 5: offer decline rate
      var effOD = ANALYTICS.offer_decline_2026 || {};
