<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruitment Executive Dashboard</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --white: #ffffff;
      --text: #1e2a3a;
      --text-dim: #6b7a8d;
      --border: #e2e6ec;
      --accent: #0ea5a0;
      --green: #0ea570;
      --green-bg: #e6f7ef;
      --orange: #e07a2f;
      --orange-bg: #fdf0e4;
      --teal: #0ea5a0;
      --teal-bg: #e0f5f4;
      --red: #d94052;
      --red-bg: #fde8eb;
      --gray: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 48px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
      padding-top: 20px;
      background: var(--white);
      padding-left: 32px;
    }
    .tab {
      padding: 12px 28px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-dim);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* KPI Cards */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .kpi-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .kpi-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .kpi-card .value.green { color: var(--green); }
    .kpi-card .value.red { color: var(--red); }
    .kpi-card .value.teal { color: var(--teal); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge.on_track, .badge.secured { background: var(--green-bg); color: var(--green); }
    .badge.covered { background: var(--teal-bg); color: var(--teal); }
    .badge.at_risk { background: var(--orange-bg); color: var(--orange); }
    .badge.empty { background: var(--red-bg); color: var(--red); }

    .conf-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .conf-badge.High { background: var(--green-bg); color: var(--green); }
    .conf-badge.Medium { background: var(--orange-bg); color: var(--orange); }
    .conf-badge.Low { background: var(--red-bg); color: var(--red); }

    /* Data Tables */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .data-table thead th {
      background: #f8f9fb;
      padding: 10px 14px;
      font-weight: 600;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .data-table thead th.num { text-align: center; }
    .data-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f3f5;
      vertical-align: middle;
    }
    .data-table tbody td.num {
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .data-table tbody td.num .zero { color: #d1d5db; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: #f8f9fb; }

    /* Department section */
    .dept-section {
      margin-bottom: 32px;
    }
    .dept-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px 10px 0 0;
      font-size: 15px;
      font-weight: 700;
    }
    .dept-header .stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.85;
    }
    .dept-header .stats span { font-weight: 700; color: #6ee7b7; }

    /* Department stacked bar + stats strip */
    .dept-strip {
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--white);
      border: 1px solid var(--border);
      border-top: none;
      padding: 12px 20px;
    }
    .stacked-bar {
      flex: 1;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      background: #f1f3f5;
    }
    .stacked-bar .seg {
      height: 100%;
      transition: width 0.3s;
    }
    .seg-green { background: var(--green); }
    .seg-teal { background: var(--teal); }
    .seg-orange { background: var(--orange); }
    .seg-red { background: var(--red); }
    .seg-gray { background: #cbd5e1; }

    .dept-kpis {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }
    .dept-kpi {
      text-align: center;
      min-width: 50px;
    }
    .dept-kpi .val {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }
    .dept-kpi .lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      font-weight: 700;
    }

    /* Sidebar layout */
    .recap-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    /* Dept sidebar cards */
    .sidebar-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .sidebar-card h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .funnel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }
    .funnel-row .label { color: var(--text-dim); font-weight: 500; }
    .funnel-row .bar-wrap {
      flex: 1;
      margin: 0 10px;
      background: #f1f3f5;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .funnel-row .bar {
      height: 100%;
      background: var(--teal);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .funnel-row .count {
      font-weight: 700;
      min-width: 28px;
      text-align: right;
      color: var(--teal);
    }

    .hm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 13px;
      border-bottom: 1px solid #f1f3f5;
    }
    .hm-row:last-child { border-bottom: none; }
    .hm-row .name { font-weight: 500; flex: 1; }
    .hm-row .days { font-weight: 600; min-width: 80px; text-align: right; }
    .hm-row .delays { font-size: 11px; color: var(--red); margin-left: 8px; min-width: 60px; text-align: right; }

    /* Expandable detail row */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-content {
      padding: 16px 20px;
      background: #f8f9fb;
      border-bottom: 2px solid var(--border);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    .detail-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .detail-box h5 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .forecast-dates {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .forecast-date {
      text-align: center;
    }
    .forecast-date .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    .forecast-date .date { font-size: 14px; font-weight: 700; }
    .forecast-date .date.green { color: var(--green); }
    .forecast-date .date.orange { color: var(--orange); }
    .forecast-date .date.red { color: var(--red); }

    .conv-bar {
      display: flex;
      align-items: center;
      padding: 3px 0;
      font-size: 12px;
    }
    .conv-bar .stage-label { width: 80px; font-weight: 500; color: var(--text-dim); }
    .conv-bar .bar-wrap {
      flex: 1;
      background: #f1f3f5;
      border-radius: 4px;
      height: 10px;
      margin: 0 8px;
      overflow: hidden;
    }
    .conv-bar .bar { height: 100%; border-radius: 4px; }
    .conv-bar .bar.good { background: var(--green); }
    .conv-bar .bar.warn { background: var(--orange); }
    .conv-bar .bar.bad { background: var(--red); }
    .conv-bar .pct { font-weight: 700; min-width: 40px; text-align: right; font-size: 12px; }

    /* SLA dot */
    .sla-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .sla-dot.green { background: var(--green); }
    .sla-dot.orange { background: var(--orange); }
    .sla-dot.red { background: var(--red); }

    /* Tech needed table */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-badge.on-track { background: var(--green-bg); color: var(--green); }
    .status-badge.at-risk { background: var(--orange-bg); color: var(--orange); }
    .status-badge.critical { background: var(--red-bg); color: var(--red); }

    /* Section headers */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Weekly tab styles */
    .weekly-role-card {
      background: var(--white);
      border: 1px solid #e5e7eb;
      border-top: none;
      padding: 16px 20px 12px;
    }
    .weekly-role-card:last-child {
      border-radius: 0 0 8px 8px;
    }
    .weekly-role-card .role-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 2px;
    }
    .weekly-role-card .recruiter {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    /* Issue badges */
    .issue-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: capitalize;
    }
    .issue-badge.quality      { background: #fef3c7; color: #92400e; }
    .issue-badge.calibration  { background: #ede9fe; color: #5b21b6; }
    .issue-badge.risk         { background: var(--red-bg, #fef2f2); color: var(--red); }
    .issue-badge.sustainability { background: var(--orange-bg, #fff7ed); color: var(--orange); }
    .issue-badge.stakeholder  { background: #dbeafe; color: #1e40af; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Collapsible */
    .toggle-btn {
      cursor: pointer;
      user-select: none;
    }

    /* Print */
    @media print {
      .tabs { display: none; }
      .tab-content { display: block !important; }
      body { background: #fff; }
    }
  </style>
</head>

  </div>

  </div>

    /* Tab switching */
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });

    document.getElementById('gen-time').textContent = 'Generated ' + EXEC.generated_at;

    /* Helpers */
    function numCell(v) {
      if (v === 0) return '<td class="num"><span class="zero">0</span></td>';
      return '<td class="num">' + v + '</td>';
    }
    function healthLabel(h) {
      var labels = {on_track: 'On Track', secured: 'Secured', covered: 'Covered', at_risk: 'At Risk', empty: 'Empty'};
      return '<span class="badge ' + h + '">' + (labels[h] || h) + '</span>';
    }
    function slaColor(status) {
      if (status === 'filling') return 'green';
      if (status === 'overdue') return 'red';
      if (status === 'warning') return 'orange';
      return 'green';
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* =========================================================
       TAB 1: RECAP OVERVIEW
       ========================================================= */
    function renderRecap() {
      var roles = EXEC.roles;
      var s = EXEC.summary;
      var depts = EXEC.dept_summaries;

      // Group roles by dept (merge Revenue -> Sales)
      var deptMap = {};
      var deptOrder = [];
      roles.forEach(function(r) {
        var dept = r.dept === 'Revenue' ? 'Sales' : r.dept;
        if (!deptMap[dept]) { deptMap[dept] = []; deptOrder.push(dept); }
        deptMap[dept].push(r);
      });
      deptOrder.sort();

      // Build dept summary lookup (also merged)
      var deptLookup = {};
      depts.forEach(function(d) { deptLookup[d.dept] = d; });

      // KPI row
      var html = '<div class="kpi-row">';
      html += '<div class="kpi-card"><div class="label">Open Positions</div><div class="value">' + s.open_positions + '</div><div style="font-size:12px;color:var(--text-dim)">' + s.open_roles + ' roles</div></div>';
      html += '<div class="kpi-card"><div class="label">On Track / Secured</div><div class="value green">' + s.on_track + '</div></div>';
      html += '<div class="kpi-card"><div class="label">At Risk / Empty</div><div class="value red">' + s.at_risk + '</div></div>';
      html += '<div class="kpi-card"><div class="label">2026 Filled YTD</div><div class="value teal">' + s.filled_2026 + '</div><div style="font-size:12px;color:var(--text-dim)">Avg TTF ' + s.avg_ttf + 'd</div></div>';
      html += '</div>';

      // Main layout: table + sidebar
      html += '<div class="recap-layout">';

      // LEFT: Per-dept role tables
      html += '<div>';
      deptOrder.forEach(function(dept) {
        var deptRoles = deptMap[dept];
        // Custom sorts
        if (dept === 'Customer Support') {
          deptRoles.sort(function(a, b) {
            var aA = /agent/i.test(a.name) ? 0 : 1;
            var bA = /agent/i.test(b.name) ? 0 : 1;
            if (aA !== bA) return aA - bA;
            return a.name.localeCompare(b.name);
          });
        }
        if (dept === 'Sales') {
          var usKw = /north america|new york|usa|\bUS\b/i;
          deptRoles.sort(function(a, b) {
            var aU = usKw.test(a.name) ? 1 : 0;
            var bU = usKw.test(b.name) ? 1 : 0;
            if (aU !== bU) return aU - bU;
            return a.name.localeCompare(b.name);
          });
        }

        var deptInfo = deptLookup[dept] || {};
        var totalPipeline = deptRoles.reduce(function(sum, r) { return sum + r.total; }, 0);
        var totalExpHires = deptRoles.reduce(function(sum, r) { return sum + r.exp_hires; }, 0).toFixed(1);
        var avgAge = deptRoles.length > 0 ? Math.round(deptRoles.reduce(function(sum, r) { return sum + r.age_days; }, 0) / deptRoles.length) : 0;

        // Get dept analytics for hired count
        var analyticsDept = (ANALYTICS.per_department || {})[dept] || {};
        var hired90d = analyticsDept.filled_2026 || 0;

        // Stacked bar segments: offer (green), cultural+technical (teal), pre_gate (orange), screened+early (gray)
        var dOffer = deptRoles.reduce(function(s, r) { return s + r.offer; }, 0);
        var dCultural = deptRoles.reduce(function(s, r) { return s + r.cultural; }, 0);
        var dTechnical = deptRoles.reduce(function(s, r) { return s + r.technical; }, 0);
        var dPreGate = deptRoles.reduce(function(s, r) { return s + r.pre_gate; }, 0);
        var dScreened = deptRoles.reduce(function(s, r) { return s + r.screened; }, 0);
        var dEarly = deptRoles.reduce(function(s, r) { return s + r.early; }, 0);
        var dTotal = dOffer + dCultural + dTechnical + dPreGate + dScreened + dEarly;

        function segPct(v) { return dTotal > 0 ? (v / dTotal * 100).toFixed(1) : 0; }

        html += '<div class="dept-section">';
        html += '<div class="dept-header"><span>' + escHtml(dept) + '</span>';
        html += '<div class="stats"><span>' + deptRoles.length + '</span> open';
        html += '&nbsp;&nbsp;<span>' + totalPipeline + '</span> pipeline</div></div>';

        // Stacked bar + stats strip
        html += '<div class="dept-strip">';
        html += '<div class="stacked-bar">';
        if (dTotal > 0) {
          html += '<div class="seg seg-green" style="width:' + segPct(dOffer) + '%" title="Offer: ' + dOffer + '"></div>';
          html += '<div class="seg seg-teal" style="width:' + segPct(dCultural + dTechnical) + '%" title="Tech+Cultural: ' + (dTechnical + dCultural) + '"></div>';
          html += '<div class="seg" style="width:' + segPct(dPreGate) + '%;background:#f59e0b" title="Team Fit: ' + dPreGate + '"></div>';
          html += '<div class="seg seg-gray" style="width:' + segPct(dScreened + dEarly) + '%" title="Early+Screened: ' + (dEarly + dScreened) + '"></div>';
        }
        html += '</div>';
        html += '<div class="dept-kpis">';
        html += '<div class="dept-kpi"><div class="val">' + deptRoles.length + '</div><div class="lbl">Open</div></div>';
        html += '<div class="dept-kpi"><div class="val">' + hired90d + '</div><div class="lbl">Hired 90D</div></div>';
        html += '<div class="dept-kpi"><div class="val">' + avgAge + 'd</div><div class="lbl">Avg Age</div></div>';
        html += '<div class="dept-kpi"><div class="val">' + totalExpHires + '</div><div class="lbl">Exp. Hires</div></div>';
        html += '</div></div>';

        html += '<table class="data-table">';
        html += '<thead><tr>';
        html += '<th style="min-width:200px">Role</th>';
        html += '<th class="num" style="width:40px">Pos</th>';
        html += '<th class="num" style="width:50px">Age</th>';
        html += '<th style="width:80px">Health</th>';
        html += '<th style="width:80px">Frontrunner</th>';
        html += '<th class="num">Early</th><th class="num">Scr</th><th class="num">TF</th>';
        html += '<th class="num">Tech</th><th class="num">Cult</th><th class="num">Offer</th>';
        html += '<th class="num" style="width:50px">Exp.</th>';
        html += '<th style="width:110px">Est. Hire</th>';
        html += '</tr></thead><tbody>';

        deptRoles.forEach(function(r, idx) {
          var rowId = 'detail-' + dept.replace(/\s/g, '') + '-' + idx;

          // Est. Hire coloring
          var estHtml = '';
          if (!r.forecast.realistic) {
            estHtml = '<span style="color:var(--red);font-weight:600">No candidates</span>';
          } else {
            var dot = slaColor(r.sla_status);
            estHtml = '<span class="sla-dot ' + dot + '"></span>' + r.forecast.realistic;
            estHtml += ' <span class="conf-badge ' + r.forecast.confidence + '">' + r.forecast.confidence + '</span>';
          }

          html += '<tr class="toggle-btn" onclick="toggleDetail(\'' + rowId + '\')">';
          html += '<td><strong>' + escHtml(r.name) + '</strong> <span style="font-size:10px;color:var(--text-dim)">&#9660;</span><br><span style="font-size:11px;color:var(--text-dim)">' + escHtml(r.recruiter) + '</span></td>';
          html += '<td class="num">' + r.positions + '</td>';
          html += '<td class="num">' + r.age_days + 'd</td>';
          html += '<td>' + healthLabel(r.health) + '</td>';
          html += '<td style="font-size:12px;font-weight:500">' + r.frontrunner + '</td>';
          html += numCell(r.early) + numCell(r.screened) + numCell(r.pre_gate);
          html += numCell(r.technical) + numCell(r.cultural) + numCell(r.offer);
          html += '<td class="num">' + r.exp_hires + '</td>';
          html += '<td>' + estHtml + '</td>';
          html += '</tr>';

          // Expandable detail row
          html += '<tr class="detail-row" id="' + rowId + '"><td colspan="13"><div class="detail-content">';
          html += '<div class="detail-grid">';

          // Forecast box
          html += '<div class="detail-box"><h5>Hire Forecast</h5>';
          if (r.forecast.realistic) {
            html += '<div class="forecast-dates">';
            html += '<div class="forecast-date"><div class="label">Optimistic</div><div class="date green">' + r.forecast.optimistic + '</div></div>';
            html += '<div class="forecast-date"><div class="label">Realistic</div><div class="date orange">' + r.forecast.realistic + '</div></div>';
            html += '<div class="forecast-date"><div class="label">Pessimistic</div><div class="date red">' + r.forecast.pessimistic + '</div></div>';
            html += '</div>';
            html += '<div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Confidence: <span class="conf-badge ' + r.forecast.confidence + '">' + r.forecast.confidence + '</span> ' + escHtml(r.forecast.confidence_reason) + '</div>';
          } else {
            html += '<div style="color:var(--red);font-weight:600">Empty pipeline — no forecast available</div>';
          }
          html += '</div>';

          // Conversion rates box
          html += '<div class="detail-box"><h5>Conversion Rate (90D)</h5>';
          var convStages = [
            {label: 'Scr→TF', val: r.conversions.screen_to_tf},
            {label: 'TF→Tech', val: r.conversions.tf_to_tech},
            {label: 'Tech→Cult', val: r.conversions.tech_to_cult},
            {label: 'Cult→Offer', val: r.conversions.cult_to_offer},
          ];
          convStages.forEach(function(cs) {
            var cls = cs.val >= 30 ? 'good' : (cs.val >= 15 ? 'warn' : 'bad');
            var w = Math.min(cs.val, 100);
            html += '<div class="conv-bar">';
            html += '<span class="stage-label">' + cs.label + '</span>';
            html += '<div class="bar-wrap"><div class="bar ' + cls + '" style="width:' + w + '%"></div></div>';
            html += '<span class="pct">' + cs.val + '%</span>';
            html += '</div>';
          });
          // Avg TA → Technical timing
          if (r.avg_ta_to_tech > 0) {
            var dayColor = r.avg_ta_to_tech > 21 ? 'var(--red)' : (r.avg_ta_to_tech > 14 ? 'var(--orange)' : 'var(--green)');
            html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:13px">';
            html += '<span style="color:var(--text-dim)">Avg TA → Tech:</span> <strong style="color:' + dayColor + '">' + r.avg_ta_to_tech + 'd</strong>';
            html += ' <span style="font-size:11px;color:var(--text-dim)">(' + r.avg_ta_to_tech_samples + ' candidates)</span>';
            html += '</div>';
          }
          html += '</div>';

          // Tech needed box
          html += '<div class="detail-box"><h5>Candidates Needed in Technical</h5>';
          if (r.tech_needed.has_data) {
            var proxColor = {'Offer stage':'var(--green)','Close':'var(--teal)','On track':'var(--blue)','Building':'var(--amber)','Early':'var(--text-dim)'}[r.tech_needed.hire_proximity] || 'var(--text-dim)';
            html += '<div style="font-size:24px;font-weight:700;color:' + (r.tech_needed.gap > 0 ? 'var(--red)' : 'var(--green)') + '">' + r.tech_needed.needed + '</div>';
            html += '<div style="font-size:12px;color:var(--text-dim)">to fill ' + r.tech_needed.positions + ' position(s) — historically ' + r.tech_needed.tech_per_offer + ' tech candidates per offer</div>';
            html += '<div style="margin-top:8px;font-size:13px">Currently: <strong>' + r.tech_needed.current + '</strong> in Tech+';
            if (r.tech_needed.in_offer) html += ' (' + r.tech_needed.in_offer + ' in Offer)';
            else if (r.tech_needed.in_cult) html += ' (' + r.tech_needed.in_cult + ' in Cultural)';
            html += '</div>';
            html += '<div style="font-size:13px">Proximity: <strong style="color:' + proxColor + '">' + r.tech_needed.hire_proximity + '</strong> <span style="color:var(--text-dim)">(' + r.tech_needed.progress_pct + '% of needed)</span></div>';
          } else {
            html += '<div style="font-size:24px;font-weight:700;color:var(--text-dim)">' + r.tech_needed.entered_tech + ' reached Technical</div>';
            html += '<div style="font-size:12px;color:var(--text-dim)">No hire yet — not enough historical data</div>';
            if (r.tech_needed.current > 0) html += '<div style="font-size:13px;margin-top:4px">' + r.tech_needed.current + ' currently in Tech+</div>';
          }
          html += '</div>';

          // Rejection reasons per stage (fit candidates + declined us only)
          var rr = r.rej_reasons || {};
          var rrStages = ['App Review', 'TA Screen', 'Team Fit', 'Technical', 'Cultural Fit', 'Offer'];
          var hasReasons = rrStages.some(function(s) { return rr[s] && rr[s].reasons.length > 0; });
          if (hasReasons) {
            html += '<div class="detail-box" style="grid-column:1/-1"><h5>Rejection Reasons by Stage</h5>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:16px">';
            rrStages.forEach(function(stage) {
              if (!rr[stage] || !rr[stage].reasons.length) return;
              html += '<div style="min-width:180px;flex:1">';
              html += '<div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text)">' + stage + ' <span style="color:var(--text-dim);font-weight:400">(' + rr[stage].total + ')</span></div>';
              rr[stage].reasons.forEach(function(item) {
                var short = item.reason.replace('Fits requirement, ', '').replace('Fits most requirement, ', '').replace('Declined us, ', '').replace('Declined us - ', '').replace('Declined by us ', '').replace('Declined by us, ', '');
                html += '<div style="font-size:11px;display:flex;justify-content:space-between;gap:6px;padding:1px 0">';
                html += '<span style="color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escHtml(item.reason) + '">' + escHtml(short) + '</span>';
                html += '<span style="font-weight:600;white-space:nowrap">' + item.pct + '%</span>';
                html += '</div>';
              });
              html += '</div>';
            });
            html += '</div></div>';
          }

          html += '</div></div></td></tr>';
        });

        html += '</tbody></table></div>';
      });
      html += '</div>';

      // RIGHT SIDEBAR: Dept funnels + HM scorecards
      html += '<div>';
      deptOrder.forEach(function(dept) {
        var di = deptLookup[dept] || {};
        var pipeline = di.pipeline || {};
        var maxVal = Math.max(pipeline.early || 0, pipeline.screened || 0, pipeline.pre_gate || 0, pipeline.technical || 0, pipeline.cultural || 0, pipeline.offer || 0, 1);

        html += '<div class="sidebar-card">';
        html += '<h4>' + escHtml(dept) + ' — Dept Funnel (Active)</h4>';
        var stages = [
          {label: 'Early', val: pipeline.early || 0},
          {label: 'Screened', val: pipeline.screened || 0},
          {label: 'Team Fit', val: pipeline.pre_gate || 0},
          {label: 'Technical', val: pipeline.technical || 0},
          {label: 'Culture', val: pipeline.cultural || 0},
          {label: 'Offer', val: pipeline.offer || 0},
        ];
        stages.forEach(function(st) {
          var w = Math.round(st.val / maxVal * 100);
          html += '<div class="funnel-row">';
          html += '<span class="label">' + st.label + '</span>';
          html += '<div class="bar-wrap"><div class="bar" style="width:' + w + '%"></div></div>';
          html += '<span class="count">' + st.val + '</span>';
          html += '</div>';
        });
        html += '</div>';

        // HM Scorecard Response
        var managers = di.hm_managers || [];
        if (managers.length > 0) {
          html += '<div class="sidebar-card">';
          html += '<h4>HM Scorecard Response (90D)</h4>';
          managers.forEach(function(m) {
            var dayColor = m.avg_days > 5 ? 'var(--red)' : (m.avg_days > 3 ? 'var(--orange)' : 'var(--green)');
            html += '<div class="hm-row">';
            html += '<span class="name">' + escHtml(m.name) + '</span>';
            html += '<span class="days" style="color:' + dayColor + '">' + m.avg_days.toFixed(1) + 'd avg (' + m.total + ')</span>';
            if (m.delays > 0) {
              html += '<span class="delays">' + m.delays + ' over 3d</span>';
            }
            html += '</div>';
          });
          html += '</div>';
        }
      });
      html += '</div>';

      html += '</div>'; // close recap-layout

      document.getElementById('tab-recap').innerHTML = html;
    }

      if (row) row.classList.toggle('open');

    function renderWeeklyRecap() {
      var html = '';

      /* ---- Section A: Weekly Pipeline Overview ---- */
      var roles = WEEKLY.roles || [];
      var lwLabel = WEEKLY.last_week_label || 'Last Week';
      var twLabel = WEEKLY.this_week_label || 'This Week';

      function fmt(n) { return n > 0 ? '<span style="font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">\u2014</span>'; }
      function fmtPipe(n) { return n > 0 ? '<span style="color:#2563eb;font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">\u2014</span>'; }
      function fmtRej(n) { return n > 0 ? '<span style="color:#ef4444;font-weight:600">' + n + '</span>' : '<span style="color:#d1d5db">\u2014</span>'; }

      // Issue type lookup from EXEC data
      var issueMap = {};
      (EXEC.roles || []).forEach(function(r) {
        if (r.issue_type) issueMap[r.name] = {type: r.issue_type, reason: r.issue_reason || ''};
      });

      // Group by dept (merge Revenue -> Sales)
      var deptMap = {};
      var deptOrder = [];
      roles.forEach(function(r) {
        var dept = r.dept === 'Revenue' ? 'Sales' : r.dept;
        if (!deptMap[dept]) { deptMap[dept] = []; deptOrder.push(dept); }
        deptMap[dept].push(r);
      });
      deptOrder.sort();

      html += '<div class="section-title">Weekly Pipeline Overview</div>';
      html += '<p style="font-size:13px;color:var(--text-dim);margin-bottom:20px">Pipeline = active candidates &nbsp;|&nbsp; ' + lwLabel + ' = rejected last week &nbsp;|&nbsp; ' + twLabel + ' = rejected this week</p>';

      deptOrder.forEach(function(dept) {
        var deptRoles = deptMap[dept];
        // Custom sorts
        if (dept === 'Customer Support') {
          deptRoles.sort(function(a, b) {
            var aA = /agent/i.test(a.role) ? 0 : 1;
            var bA = /agent/i.test(b.role) ? 0 : 1;
            if (aA !== bA) return aA - bA;
            return a.role.localeCompare(b.role);
          });
        }
        if (dept === 'Sales') {
          var usKw = /north america|new york|usa|\bUS\b/i;
          deptRoles.sort(function(a, b) {
            var aU = usKw.test(a.role) ? 1 : 0;
            var bU = usKw.test(b.role) ? 1 : 0;
            if (aU !== bU) return aU - bU;
            return a.role.localeCompare(b.role);
          });
        }

        html += '<div style="margin-bottom:24px">';
        html += '<div style="font-size:14px;font-weight:700;color:#fff;background:#1a1a2e;padding:8px 16px;border-radius:8px 8px 0 0">' + escHtml(dept) + '</div>';

        deptRoles.forEach(function(r, idx) {
          var isLast = idx === deptRoles.length - 1;
          var borderRadius = isLast ? 'border-radius:0 0 8px 8px;' : '';
          html += '<div class="weekly-role-card" style="' + borderRadius + '">';
          var iss = issueMap[r.role];
          html += '<div class="role-name">' + escHtml(r.role) + (iss ? ' <span class="issue-badge ' + iss.type + '" title="' + escHtml(iss.reason) + '">' + iss.type + '</span>' : '') + '</div>';
          html += '<div class="recruiter">' + escHtml(r.recruiter || '') + '</div>';

          html += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
          html += '<tr><th style="text-align:left;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Stage</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Pipeline</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">Last Wk Rejected</th>' +
            '<th style="text-align:right;font-weight:600;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;border-bottom:2px solid #e5e7eb">This Wk Rejected</th></tr>';

          (r.stages || []).forEach(function(st) {
            var isOffer = st.stage === 'Offer';
            var rowStyle = isOffer ? 'background:#f0fdf4;' : '';
            var stageStyle = isOffer ? 'font-weight:700;color:#16a34a;' : 'font-weight:500;color:#374151;';
            html += '<tr style="' + rowStyle + '">' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;' + stageStyle + '">' + st.stage + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtPipe(st.pipeline) + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtRej(st.rej_lw) + '</td>' +
              '<td style="padding:5px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-variant-numeric:tabular-nums">' + fmtRej(st.rej_tw) + '</td></tr>';
          });

          html += '<tr style="border-top:2px solid #e5e7eb">' +
            '<td style="padding:5px 12px;font-weight:700;color:#1a1a2e">Total</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtPipe(r.total_pipeline) + '</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtRej(r.total_rej_lw) + '</td>' +
            '<td style="padding:5px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">' + fmtRej(r.total_rej_tw) + '</td></tr>';

          html += '</table></div>';
        });

        html += '</div>';
      });

      /* ---- Section B: Candidates Needed in Technical ---- */
      html += '<div class="section-title">Candidates Needed in Technical to Fill</div>';
      html += '<p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Based on actual historical data: how many candidates reached Technical for each offer made. "X" = not enough data yet (no offers made for this role).</p>';

      html += '<table class="data-table"><thead><tr>';
      html += '<th>Role</th><th>Dept</th><th class="num">Positions</th>';
      html += '<th class="num">In Tech+</th><th class="num">Tech / Offer</th><th class="num">Need in Tech</th>';
      html += '<th class="num">Gap</th><th>Proximity</th><th class="num">Avg TA→Tech</th>';
      html += '</tr></thead><tbody>';

      // Sort: roles with data first (by proximity: Offer stage > Close > On track > Building > Early), then no-data roles
      var proxOrder = {'Offer stage':0,'Close':1,'On track':2,'Building':3,'Early':4};
      var execRoles = (EXEC.roles || []).slice().sort(function(a, b) {
        if (a.tech_needed.has_data && !b.tech_needed.has_data) return -1;
        if (!a.tech_needed.has_data && b.tech_needed.has_data) return 1;
        if (a.tech_needed.has_data && b.tech_needed.has_data) {
          var pa = proxOrder[a.tech_needed.hire_proximity] ?? 5;
          var pb = proxOrder[b.tech_needed.hire_proximity] ?? 5;
          if (pa !== pb) return pa - pb;
        }
        return b.tech_needed.gap - a.tech_needed.gap;
      });
      execRoles.forEach(function(r) {
        var tn = r.tech_needed;
        html += '<tr>';
        html += '<td><strong>' + escHtml(r.name) + '</strong></td>';
        html += '<td style="color:var(--text-dim)">' + escHtml(r.dept) + '</td>';
        html += '<td class="num">' + tn.positions + '</td>';
        html += '<td class="num">' + tn.current + '</td>';
        if (tn.has_data) {
          var proxColor = {'Offer stage':'var(--green)','Close':'var(--teal)','On track':'var(--blue)','Building':'var(--amber)','Early':'var(--text-dim)'}[tn.hire_proximity] || 'var(--text-dim)';
          html += '<td class="num" style="color:var(--text-dim)">' + tn.tech_per_offer + ':1</td>';
          html += '<td class="num" style="font-weight:700">' + tn.needed + '</td>';
          html += '<td class="num" style="font-weight:700;color:' + (tn.gap > 0 ? 'var(--red)' : 'var(--green)') + '">' + (tn.gap > 0 ? '+' + tn.gap : tn.gap) + '</td>';
          html += '<td><span class="status-badge" style="color:' + proxColor + ';font-weight:600">' + tn.hire_proximity + ' <span style="font-weight:400;opacity:.7">(' + tn.progress_pct + '%)</span></span></td>';
        } else {
          html += '<td class="num" style="color:var(--text-dim)">—</td>';
          html += '<td class="num">' + tn.entered_tech + '</td>';
          html += '<td class="num" style="color:var(--text-dim)">—</td>';
          html += '<td><span class="status-badge" style="background:var(--surface);color:var(--text-dim)">No hire yet</span></td>';
        }
        // Avg TA → Tech timing
        var taDays = r.avg_ta_to_tech || 0;
        if (taDays > 0) {
          var taDayColor = taDays > 21 ? 'var(--red)' : (taDays > 14 ? 'var(--orange)' : 'var(--green)');
          html += '<td class="num" style="font-weight:600;color:' + taDayColor + '">' + taDays + 'd</td>';
        } else {
          html += '<td class="num" style="color:var(--text-dim)">—</td>';
        }
        html += '</tr>';
      });
      html += '</tbody></table>';

      /* ---- Section C: Avg Rejection Rates per Stage ---- */
      html += '<div class="section-title">Average Rejection Rate per Stage per Role</div>';
      html += '<p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Shows what percentage of total rejections happen at each stage. High rejection rates at later stages indicate calibration issues.</p>';

      html += '<table class="data-table"><thead><tr>';
      html += '<th>Role</th><th>Dept</th>';
      html += '<th class="num">TA Screen %</th><th class="num">Team Fit %</th>';
      html += '<th class="num">Technical %</th><th class="num">Cultural %</th>';
      html += '<th class="num">Offer %</th><th class="num">Total Rej</th>';
      html += '</tr></thead><tbody>';

      var sortedByRej = (EXEC.roles || []).slice().sort(function(a, b) { return b.rej_rates.total_rejected - a.rej_rates.total_rejected; });
      sortedByRej.forEach(function(r) {
        var rr = r.rej_rates;
        if (rr.total_rejected === 0) return; // skip roles with no rejection data

        function rejCell(val) {
          if (val === 0) return '<td class="num"><span class="zero">0</span></td>';
          var color = val > 50 ? 'var(--red)' : (val > 30 ? 'var(--orange)' : 'var(--text)');
          return '<td class="num" style="color:' + color + ';font-weight:600">' + val + '%</td>';
        }

        html += '<tr>';
        html += '<td><strong>' + escHtml(r.name) + '</strong></td>';
        html += '<td style="color:var(--text-dim)">' + escHtml(r.dept) + '</td>';
        html += rejCell(rr.ta_screening) + rejCell(rr.team_fit) + rejCell(rr.technical);
        html += rejCell(rr.cultural) + rejCell(rr.offer);
        html += '<td class="num" style="font-weight:600">' + rr.total_rejected + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';

      document.getElementById('tab-weekly').innerHTML = html;
    }

    /* Render all */
    renderRecap();
    renderWeeklyRecap();
  </script>
</body>
</html>
